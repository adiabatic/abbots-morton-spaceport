name: Build and Deploy

on:
  # Manual trigger
  workflow_dispatch:
  # On version tags
  push:
    tags:
      - 'release/*'

# Sets permissions for GitHub Pages deployment
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: |
          uv sync
          uv pip install brotli  # for woff2 conversion

      - name: Build fonts
        run: |
          mkdir -p build
          uv run python tools/build_font.py glyph_data/ build/

      - name: Convert to woff2
        run: |
          uv run python -c "
          from fontTools.ttLib import TTFont
          families = ['AbbotsMortonSpaceportMono', 'AbbotsMortonSpaceportSansJunior', 'AbbotsMortonSpaceportSansSenior']
          for family in families:
              for style in ('Regular', 'Bold'):
                  font = TTFont(f'build/{family}-{style}.otf')
                  font.flavor = 'woff2'
                  font.save(f'build/{family}-{style}.woff2')
          "

      - name: Generate test pages
        run: uv run python tools/gen_ensure_sanity.py

      - name: Prepare site
        run: |
          mkdir -p site
          cp build/AbbotsMortonSpaceportMono-Regular.otf site/
          cp build/AbbotsMortonSpaceportMono-Regular.woff2 site/
          cp build/AbbotsMortonSpaceportMono-Bold.otf site/
          cp build/AbbotsMortonSpaceportMono-Bold.woff2 site/
          cp build/AbbotsMortonSpaceportSansJunior-Regular.otf site/
          cp build/AbbotsMortonSpaceportSansJunior-Regular.woff2 site/
          cp build/AbbotsMortonSpaceportSansJunior-Bold.otf site/
          cp build/AbbotsMortonSpaceportSansJunior-Bold.woff2 site/
          cp build/AbbotsMortonSpaceportSansSenior-Regular.otf site/
          cp build/AbbotsMortonSpaceportSansSenior-Regular.woff2 site/
          cp build/AbbotsMortonSpaceportSansSenior-Bold.otf site/
          cp build/AbbotsMortonSpaceportSansSenior-Bold.woff2 site/
          cp test/DepartureMono-Regular.otf site/
          cp test/index.html site/index.html
          cp test/exotics.html site/
          cp test/glyph-editor.html site/
          cp test/specimen.html site/
          cp test/tables.html site/
          cp test/extra-senior-words.html site/
          cp test/ensure-sanity.html site/
          cp test/the-manual.html site/
          cp test/shared.css site/
          cp test/shared.js site/
          cp test/gear-menu.js site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Upload font files for release
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: font-files
          path: |
            build/AbbotsMortonSpaceportMono-Regular.otf
            build/AbbotsMortonSpaceportMono-Regular.woff2
            build/AbbotsMortonSpaceportMono-Bold.otf
            build/AbbotsMortonSpaceportMono-Bold.woff2
            build/AbbotsMortonSpaceportSansJunior-Regular.otf
            build/AbbotsMortonSpaceportSansJunior-Regular.woff2
            build/AbbotsMortonSpaceportSansJunior-Bold.otf
            build/AbbotsMortonSpaceportSansJunior-Bold.woff2
            build/AbbotsMortonSpaceportSansSenior-Regular.otf
            build/AbbotsMortonSpaceportSansSenior-Regular.woff2
            build/AbbotsMortonSpaceportSansSenior-Bold.otf
            build/AbbotsMortonSpaceportSansSenior-Bold.woff2
            README.md
            FONTLOG.md

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download font files
        uses: actions/download-artifact@v4
        with:
          name: font-files
          path: release-contents

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/release/}" >> $GITHUB_OUTPUT

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          # Extract text from "### $VERSION" until next "### " or EOF
          CHANGELOG=$(awk "/^### ${VERSION//./\\.}/{found=1; next} /^### /{found=0} found" release-contents/FONTLOG.md)
          # Handle multi-line output for GitHub Actions
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create release zip
        run: |
          cd release-contents
          mv build/* .
          rmdir build
          zip -r "../abbots-morton-spaceport-${{ steps.version.outputs.VERSION }}.zip" .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: abbots-morton-spaceport-${{ steps.version.outputs.VERSION }}.zip
          body: ${{ steps.changelog.outputs.CHANGELOG }}

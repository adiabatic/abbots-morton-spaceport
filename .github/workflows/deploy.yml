name: Build and Deploy

on:
  # Manual trigger
  workflow_dispatch:
  # On version tags
  push:
    tags:
      - 'release/*'

# Sets permissions for GitHub Pages deployment
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: |
          uv sync
          uv pip install brotli  # for woff2 conversion

      - name: Build fonts
        run: |
          mkdir -p build
          uv run python tools/build_font.py glyph_data/ build/

      - name: Convert to woff2
        run: |
          uv run python -c "
          from fontTools.ttLib import TTFont
          from pathlib import Path
          for otf in Path('build').glob('*.otf'):
              font = TTFont(otf)
              font.flavor = 'woff2'
              font.save(otf.with_suffix('.woff2'))
          "

      - name: Generate test pages
        run: uv run python tools/gen_ensure_sanity.py

      - name: Prepare site
        run: |
          mkdir -p site
          cp build/*.otf build/*.woff2 site/
          cp test/DepartureMono-Regular.otf site/
          cp test/*.html site/
          cp test/shared.css test/shared.js test/gear-menu.js site/
          cp test/quikscript-title.svg site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Upload font files for release
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7
        with:
          name: font-files
          path: |
            build/*.otf
            build/*.woff2
            README.md
            FONTLOG.md

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download font files
        uses: actions/download-artifact@v8
        with:
          name: font-files
          path: release-contents

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/release/}" >> $GITHUB_OUTPUT

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          # Extract text from "### $VERSION" until next "### " or EOF
          CHANGELOG=$(awk "/^### ${VERSION//./\\.}/{found=1; next} /^### /{found=0} found" release-contents/FONTLOG.md)
          # Handle multi-line output for GitHub Actions
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create release zip
        run: |
          cd release-contents
          mv build/* .
          rmdir build
          zip -r "../abbots-morton-spaceport-${{ steps.version.outputs.VERSION }}.zip" .

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: abbots-morton-spaceport-${{ steps.version.outputs.VERSION }}.zip
          body: ${{ steps.changelog.outputs.CHANGELOG }}

globs:
  - "**/*.md"

ignores:
  - ".venv/**"
  - "node_modules/**"
  - ".uv-cache/**"
  - "tmp/**"
  - "rebuild/evidence/findings/**"
  - "rebuild/evidence/jitter-candidates.md"

config:
  line-length: false
  first-line-heading: false
  no-inline-html: false
  no-duplicate-heading:
    siblings_only: true
  emphasis-style:
    style: underscore
  strong-style:
    style: asterisk

          not_before: null
          not_after:
            - {family: qsYe}
            - {family: qsOwe}
            - {family: qsShe}
            - {family: qsZoo, traits: [half]}
            - {family: qsDay, traits: [half]}
        derive:
          extend_entry_after: null
          extend_exit_before: null
        gate_feature_behind: ss04
        modifiers: [before-utter]

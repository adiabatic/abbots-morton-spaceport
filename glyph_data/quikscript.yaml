context_sets:
  reaches_up_and_way_over_at_least_part_of_the_next_letter:
  - {family: qsI}
  - {family: qsAh, modifiers: [ex-ext-1]}
  - {family: qsUtter, modifiers: [ex-ext-1]}
  - {family: qsDay_qsUtter, modifiers: [ex-ext-1]}
  - {family: qsJai_qsUtter, modifiers: [ex-ext-1]}
  - {family: qsJay_qsUtter, modifiers: [ex-ext-1]}
  - {family: qsSee_qsUtter, modifiers: [ex-ext-1]}
  - {family: qsVie_qsUtter, modifiers: [ex-ext-1]}
  - {family: qsWay_qsUtter, modifiers: [ex-ext-1]}
  - {family: qsWhy_qsUtter, modifiers: [ex-ext-1]}
  # Superset of `reaches_up_and_way_over...`, for followers whose en-y5 will accept any predecessor that gets up to the x-height — including ·I, whose exit is just one pixel past its own right edge. The narrower "way over" set stays the right choice for followers (qsThey, qsMay, qsThey_qsUtter) whose entry is set back far enough that only a deeply-extended predecessor exit can reach it.
  reaches_up_and_a_little_over_at_least_part_of_the_next_letter:
  - {context_set: reaches_up_and_way_over_at_least_part_of_the_next_letter}
  - {family: qsI}
  vie_may_entry_extend_triggers:
  - {family: qsPea}
  - {family: qsTea}
  - {family: qsYe}
  - {family: qsHe}
  - {family: qsIt}
  utter_reaches_way_back_after:
  - {family: qsFee, modifiers: [ex-y5, before-utter]}
  - {family: qsMay}
  xheight_exit_reaches_into_may:
  - {family: qsFee, modifiers: [ex-y5]}
  utter_reaches_way_back_before:
  - {family: qsSee}
  - {family: qsIng}
  - {family: qsNo}
  - {family: qsLow}
  utter_before_may:
  - {family: qsMay}
  - {family: qsMay, modifiers: [en-y0]}
  - {family: qsMay, modifiers: [en-y0, en-ext-1]}
  - {family: qsMay, modifiers: [en-y0, ex-ext-1]}
  - {family: qsMay, modifiers: [en-y0, en-ext-1, ex-ext-1]}
  halves_exit_xheight:
  - {family: qsPea, traits: [half]}
  - {family: qsTea, traits: [half], modifiers: [ex-y5]}
  - {family: qsTea, traits: [half], modifiers: [en-y8, ex-y5]}
  - {family: qsHe, traits: [half]}
  halves_exit_xheight_no_pea:
  - {family: qsTea, traits: [half], modifiers: [ex-y5]}
  - {family: qsTea, traits: [half], modifiers: [en-y8, ex-y5]}
  - {family: qsHe, traits: [half]}
  # The Quikscript letter families fall into three height categories:
  # - Shorts fit within the x-height (6-pixel bitmap, baseline at y=0)
  # - Talls rise from the baseline to the cap height (9-pixel bitmap)
  # - Deeps are also 9 pixels tall but sit with y_offset=-3, so they descend below the baseline
  # Regardless of whether these lists are actually used or not, the `shorts`, `deeps`, and `talls` lists are documentation that should not be deleted in scans for things to clean up.
  shorts:
  - {family: qsNo}
  - {family: qsLow}
  - {family: qsRoe}
  - {family: qsLlan}
  - {family: qsIt}
  - {family: qsEat}
  - {family: qsEt}
  - {family: qsEight}
  - {family: qsAt}
  - {family: qsI}
  - {family: qsAh}
  - {family: qsAwe}
  - {family: qsOx}
  - {family: qsOy}
  - {family: qsUtter}
  - {family: qsOut}
  - {family: qsOwe}
  - {family: qsFoot}
  - {family: qsOoze}
  talls:
  - {family: qsPea}
  - {family: qsTea}
  - {family: qsKey}
  - {family: qsThaw}
  - {family: qsFee}
  - {family: qsSee}
  - {family: qsShe}
  - {family: qsCheer}
  - {family: qsYe}
  - {family: qsHe}
  - {family: qsIng}
  - {family: qsLoch}
  - {family: qsExcite}
  deeps:
  - {family: qsBay}
  - {family: qsDay}
  - {family: qsGay}
  - {family: qsThey}
  - {family: qsVie}
  - {family: qsZoo}
  - {family: qsJai}
  - {family: qsJay}
  - {family: qsWay}
  - {family: qsWhy}
  - {family: qsMay}
  - {family: qsExam}
  # Letters that drop their baseline cursive entry after a tall (qsThaw does this via its `noentry_after_tall` form, which sets `entry: null` for `after: talls`, even though its default `prop` form keeps an entry at y=0). A preceding tall must not commit to its baseline-exit "wide" form when one of these follows, since the follower won't keep an entry to join to.
  no_baseline_join_after_tall:
  - {family: qsThaw}
  # Letters whose right side runs straight down to the baseline (or tails off down-and-to-the-right) when they exit there — so any follower with an entry that swings in from the left at the baseline can't curl behind them.
  flat_on_right_at_baseline:
  - {family: qsPea, exit_y: 0}
  - {family: qsTea, exit_y: 0}
  - {family: qsYe, exit_y: 0}
  - {family: qsHe, exit_y: 0}
  - {family: qsExcite, exit_y: 0}
  - {family: qsIt, exit_y: 0}
  - {family: qsIng, exit_y: 0}
  - {family: qsEat, exit_y: 0}
  - {family: qsEight, exit_y: 0}
  - {family: qsOx, exit_y: 0}
  - {family: qsOy, exit_y: 0}
  - {family: qsOoze, exit_y: 0}
  # Half-letters that exit at the x-height (qsPea/qsTea/qsHe, via halves_exit_xheight) plus ·I, whose exit sits one pixel past its own right edge — the predecessors whose exit gets a 1-pixel nudge to reach ·They's deeply set-back x-height entry.
  halves_and_i_exit_xheight:
  - {family: qsI}
  - {context_set: halves_exit_xheight}
  # The followers ·Gay reaches toward at the baseline: when one comes next, ·Gay widens its baseline exit by a pixel, and the same set is the one excluded from ·Gay's entry_baseline form.
  gay_reaches_baseline_exit_forward:
  - {family: qsTea}
  - {family: qsDay}
  - {family: qsZoo}
  - {family: qsRoe}
  - {family: qsExam}
  - {family: qsIt}
  - {family: qsI}
  # Followers that don't accept ·Tea's half-form x-height exit, so ·Tea's x-height-exit half forms must not be picked before them.
  followers_that_reject_tea_half_xheight_exit:
  - {family: qsTea}
  - {family: qsFee}
  - {family: qsCheer}
  - {family: qsYe}
  - {family: qsOwe}
  - {family: qsFoot}
  # Predecessors after which ·Excite abandons its left-side join — its entryless forms fire after exactly these.
  excite_drops_entry_after:
  - {family: qsPea}
  - {family: qsTea}
  - {family: qsYe}
  # Predecessors (·May, ·Utter) that exit at the x-height, so they join into ·Pea's x-height entry.
  xheight_exit_into_pea_xheight_entry:
  - {family: qsMay, exit_y: 5}
  - {family: qsUtter, exit_y: 5}
restore_isolated_form_overrides:
  # When a forward-pair YAML `not_after` blocks an upgrade and leaves the target as bare `target`, but isolated shaping of `target follower` would render `isolated_form`, emit a post-pass rule `sub [prior_variants] target' follower_variants by isolated_form;` so the in-context render matches the isolated render. Each entry compiles to a rule under `calt_pair_guard_reflip_<target_base>`.
  - {prior: qsNo, target: qsIt, follower: qsDay, isolated_form: qsIt.en-y5.ex-y0}
  - {prior: qsJay, target: qsIt, follower: qsZoo, isolated_form: qsIt.ex-y0}
  - {prior: qsJay, target: qsIt, follower: qsNo, isolated_form: qsIt.ex-y0}
  - {prior: qsYe, target: qsIt, follower: qsZoo, isolated_form: qsIt.ex-y0}
  - {prior: qsYe, target: qsIt, follower: qsNo, isolated_form: qsIt.ex-y0}
  - {prior: qsIt, target: qsIt, follower: qsZoo, isolated_form: qsIt.ex-y0}
  - {prior: qsEat, target: qsIt, follower: qsZoo, isolated_form: qsIt.ex-y0}
  - {prior: qsEat, target: qsIt, follower: qsNo, isolated_form: qsIt.ex-y0}
predecessor_demote_overrides:
  # When a forward-pair lookup extends a predecessor toward a trigger that has itself become entryless (because a deeper third glyph stripped its entry), the predecessor's extension reaches into empty air. Demote the predecessor back to its isolated form so the rendered chain matches what isolated shaping of `trigger ...` would render on its own. The rule fires whenever the buffer state at this post-pass is `predecessor_form trigger_form`, which already implies the trigger is in its entryless form — no third-glyph constraint needed. Each entry compiles to a rule `sub predecessor_form' trigger_form by isolated_form;` under `calt_pred_demote_<predecessor_base>`.
  - {predecessor_form: qsExcite.en-y0.ex-y0.before-vertical, trigger_form: qsIt.ex-y0.before-day.after-no-baseline-join, isolated_form: qsExcite}
  - {predecessor_form: qsExcite.en-y0.ex-y0.before-vertical.noentry, trigger_form: qsGay, isolated_form: qsExcite.nonjoining-left}
  - {predecessor_form: qsExcite.ex-y0.before-vertical, trigger_form: qsIt, isolated_form: qsExcite}
  - {predecessor_form: qsExcite.ex-y0.before-vertical, trigger_form: qsIt.before-utter, isolated_form: qsExcite}
  - {predecessor_form: qsExcite.ex-y0.before-vertical, trigger_form: qsIt.ex-y0, isolated_form: qsExcite}
  - {predecessor_form: qsExcite.ex-y0.before-vertical, trigger_form: qsUtter.alt, isolated_form: qsExcite}
  - {predecessor_form: qsExcite.ex-y0.before-vertical.after-baseline-letter, trigger_form: qsGay, isolated_form: qsExcite.en-y0.noexit}
  - {predecessor_form: qsJai.en-y5.ex-ext-1, trigger_form: qsIt.ex-y0, isolated_form: qsJai}
  - {predecessor_form: qsJai.en-y5.ex-ext-1, trigger_form: qsTea.ex-y0, isolated_form: qsJai}
  - {predecessor_form: qsMay.ex-y0, trigger_form: qsGay.ex-y0, isolated_form: qsMay}
  - {predecessor_form: qsMay.ex-ext-1, trigger_form: qsFee.ex-y5, isolated_form: qsMay}
  - {predecessor_form: qsMay.ex-noentry, trigger_form: qsThey_qsUtter.noentry, isolated_form: qsMay}
  - {predecessor_form: qsNo.alt, trigger_form: qsGay.ex-y0, isolated_form: qsNo}
  - {predecessor_form: qsNo.alt, trigger_form: qsIt.ex-y0, isolated_form: qsNo}
  - {predecessor_form: qsNo.alt, trigger_form: qsUtter.alt, isolated_form: qsNo}
  - {predecessor_form: qsNo.ex-ext-1, trigger_form: qsFee.ex-y5, isolated_form: qsNo}
  - {predecessor_form: qsWay.half, trigger_form: qsGay.ex-y0, isolated_form: qsWay}
  - {predecessor_form: qsWay.half, trigger_form: qsGay.ex-y0.ex-ext-1, isolated_form: qsWay}
  - {predecessor_form: qsWhy.half, trigger_form: qsGay.ex-y0, isolated_form: qsWhy}
  - {predecessor_form: qsWhy.half, trigger_form: qsGay.ex-y0.ex-ext-1, isolated_form: qsWhy}
trailing_demote_overrides:
  # When a forward-pair override changes a leader into an entry-preserving form with no exit, a trailing glyph may have already picked a backward upgrade based on the leader's older exit. Demote the trailing glyph back to the isolated right-half form once the leader's no-exit form is in the buffer. Each entry compiles to `sub leader_form trailing_form' by isolated_form;` under `calt_trailing_demote_<trailing_base>`.
  - {leader_form: qsIt.en-y0.ex-noentry.before-day-exam, trailing_form: qsDay.half, isolated_form: qsDay}
  - {leader_form: qsIt.en-y0.ex-noentry.before-day-exam.en-ext-1, trailing_form: qsDay.half, isolated_form: qsDay}

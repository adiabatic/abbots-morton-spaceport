glyphs:
  space:
    advance_width: 7
    bitmap: []

  # Naming conventions for glyph variants:
  #
  # .prop          default proportional form (may or may not have cursive anchors)
  # .entry-*       contextual variant named by the calt trigger direction (backward-looking),
  #                not an exhaustive list of anchors — an exit anchor may also be present
  # .exit-*        contextual variant named by the calt trigger direction (forward-looking),
  #                not an exhaustive list of anchors — an entry anchor may also be present
  # .half          Quikscript half-letter (community term): deep letters omit the deep stroke,
  #                tall letters render only the top or bottom portion
  # .alt           alternate letterform
  # .fina          word-final form (OpenType convention)
  # .before-X      context qualifier: calt triggers before glyph X (build uses calt_before field)
  # .after-X       context qualifier: calt triggers after glyph X (build uses calt_after field)
  # .extended      extended connecting stroke (wider bitmap to bridge a gap)
  #
  # Height labels: baseline (y=0), y1, xheight (y=5), y6, top (y=8)

  # NB:
  # width is 5 pixels
  # x-height is 6 pixels
  # Talls are 9 pixels
  # Deeps are 9 pixels
  # Angled parentheses (qsAngleParenLeft, qsAngleParenRight) are 12 pixels
  # Add a nothing comment on the bottom inside of the X-height or right on top of the baseline

  # Quikscript letters (CSUR PUA U+E650–U+E67F)

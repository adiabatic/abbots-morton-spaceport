        anchors:
          exit: [1, 0]
        select:
          before: [{family: qsDay, entry_y: 0}]
        modifiers: [ex-y0, before-day, after-no-baseline-join]
      before_utter: # needed to make words ending in -ian look right
        shape: prop
        anchors:
          exit: [1, 0]
        select:
          before: [{family: qsUtter, entry_y: 0}]
          not_after:
            - {family: qsZoo}
            - {family: qsIt}
            - {family: qsEat}
            - {family: qsOwe}
            - {family: qsShe}

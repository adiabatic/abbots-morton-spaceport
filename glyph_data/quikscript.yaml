                - {family: qsAwe}
                - {family: qsOx}
                - {family: qsOy}
                - {family: qsOoze}
        modifiers: [before-day-exam]
      entry_nowhere_exit_xheight:
        shape: prop
        anchors:
          exit: [1, 5]
        select:
          not_after: [{family: qsOwe}]
          not_before: [{family: qsDay, entry_y: 5}, {family: qsYe}, {family: qsZoo}]
        modifiers: [ex-y5]
      entry_nowhere_exit_baseline:
        shape: prop
        anchors:
          exit: [1, 0]
        strip_entry_before: true
        select:
          not_after: [{family: qsBay}, {family: qsDay}, {family: qsGay}, {family: qsShe}]
          not_before: [{family: qsTea}, {family: qsIt}, {family: qsRoe}]
        modifiers: [ex-y0]
      entry_nowhere_exit_baseline_before_day:
        # When ·It doesn't join its predecessor at the baseline (word-initial, after a word break, or after a non-joining letter) and ·Day follows, ·It exits at the baseline into a half-·Day — the only legal ·It·Day join, since the full ·Day's x-height entry would force the forbidden x-height join. This is a separate form (not `entry_nowhere_exit_baseline`, which carries `strip_entry_before` and handles every other follower) so adding a ·Day trigger here can't disturb the baseline join into ·No/·Zoo/·May. The three modifiers are deliberate: a fwd-pair lookup with more modifiers sorts (and so runs) before one with fewer, and this needs to beat `entry_baseline_exit_noentry_before_day_exam` (three modifiers) so the post-ZWNJ `qsIt.noentry` upgrades to this ex-y0 form instead of being reverted to the bare base by before-day-exam's entry-preserving noentry rule.

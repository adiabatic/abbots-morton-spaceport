        modifiers: [entry-y6]
      entry_y6_exit_baseline:
        inherits: entry_y6
        anchors:
          exit: [5, 0]
        select:
          not_before: [{entry_y: 5, except: [{family: qsTea}, {family: qsDay}, {family: qsFee}, {family: qsYe}]}]
        modifiers: [entry-y6, exit-baseline]
      entry_xheight:
        shape: dips_down_to_short_height
        anchors:
          entry: [1, 5]
          exit: [5, 0]
        select:
          after: [{family: qsMay}, {family: qsUtter}]
          not_before: [{family: qsZoo}, {family: qsCheer}, {family: qsJay}, {family: qsNo}, {family: qsRoe}, {family: qsLlan}, {family: qsIt}, {family: qsEt}, {family: qsEight}, {family: qsAwe}, {family: qsOx}, {family: qsOwe}, {family: qsFoot}]

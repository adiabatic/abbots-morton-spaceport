        select:
          before: [{family: qsDay}, {family: qsExam}]
          not_after:
            - exit_y: 0
              except:
                - {family: qsBay}
                - {family: qsDay}
                - {family: qsKey}
                - {family: qsGay}
                - {family: qsZoo}
                - {family: qsShe}
                - {family: qsJai}
                - {family: qsCheer}
                - {family: qsIng}
                - {family: qsLlan}

          extend_entry_after: {by: 1, targets: [{context_set: halves_exit_xheight}]}
        modifiers: [entry-xheight, exit-xheight]
      half_entry_y6_exit_y6:
        inherits: half
        anchors:
          entry: [1, 6]
          exit: [4, 6]
        select:
          not_before: null
          before: [{family: qsPea}]
        modifiers: [entry-y6, exit-y6]

        modifiers: [entry-y6]
      entry_y6_exit_baseline:
        shape: prop
        anchors:
          entry: [1, 6]
          exit: [5, 0]
        modifiers: [entry-y6, exit-baseline]
      entry_xheight:
        shape: dips_down_to_short_height
        anchors:
          entry: [1, 5]
          exit: [5, 0]
        select:
          after: [{family: qsUtter}, {family: qsMay}]
          not_before: [{family: qsAwe}, {family: qsCheer}, {family: qsEight}, {family: qsEt}, {family: qsFoot}, {family: qsIt}, {family: qsJay}, {family: qsLlan}, {family: qsNo}, {family: qsOwe}, {family: qsOx}, {family: qsRoe}, {family: qsZoo}]
        derive:
          extend_entry_after: {by: 1, targets: [{context_set: halves_exit_xheight}]}
        modifiers: [entry-xheight]
      half_entry_y6:
        inherits: half
        anchors:
          entry: [1, 6]
        modifiers: [entry-y6]
      half:
        shape: half
        anchors:
          exit: [4, 5]
        select:
          not_before: [{family: qsDay}, {family: qsFee}, {family: qsTea}, {family: qsYe}]
        traits: [half]
      half_entry_xheight_exit_xheight:
        inherits: half
        anchors:
          entry: [1, 5]
        select:
          after: [{family: qsUtter}, {family: qsMay}]
        derive:

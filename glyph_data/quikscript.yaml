  halves_exit_xheight:
  - {family: qsHe, traits: [half]}
  - {family: qsTea, traits: [half], modifiers: [exit-xheight]}
  - {family: qsTea, traits: [half], modifiers: [entry-top, exit-xheight]}
  - {family: qsPea, traits: [half]}
  # The Quikscript letter families fall into three height categories:
  # - Shorts fit within the x-height (6-pixel bitmap, baseline at y=0)
  # - Talls rise from the baseline to the cap height (9-pixel bitmap)
  # - Deeps are also 9 pixels tall but sit with y_offset=-3, so they descend below the baseline
  # Regardless of whether these lists are actually used or not, the `shorts`, `deeps`, and `talls` lists are documentation that should not be deleted in scans for things to clean up.
  shorts:
  - {family: qsNo}
  - {family: qsLow}
  - {family: qsRoe}
  - {family: qsIt}
  - {family: qsEat}
  - {family: qsEt}
  - {family: qsEight}
  - {family: qsAt}
  - {family: qsI}
  - {family: qsAh}
  - {family: qsAwe}
  - {family: qsOx}
  - {family: qsOy}
  - {family: qsUtter}
  - {family: qsOut}
  - {family: qsOwe}
  - {family: qsFoot}
  - {family: qsOoze}
  - {family: qsLlan}
  talls:
  - {family: qsPea}
  - {family: qsTea}
  - {family: qsKey}
  - {family: qsThaw}
  - {family: qsFee}
  - {family: qsSee}
  - {family: qsShe}
  - {family: qsCheer}
  - {family: qsYe}
  - {family: qsHe}
  - {family: qsIng}
  - {family: qsLoch}
  - {family: qsExcite}
  deeps:
  - {family: qsBay}
  - {family: qsDay}
  - {family: qsGay}
  - {family: qsThey}
  - {family: qsVie}
  - {family: qsZoo}
  - {family: qsJai}
  - {family: qsJay}
  - {family: qsWay}
  - {family: qsWhy}
  - {family: qsMay}
  - {family: qsExam}
  # Letters whose default form does not accept a baseline cursive entry
  # (no anchor at y=0). A preceding tall must not commit to its
  # baseline-exit "wide" form when one of these follows, since the join
  # cannot form anyway.
  no_baseline_join_after_tall:
  - {family: qsThaw}

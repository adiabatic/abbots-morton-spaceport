context_sets:
  reaches_up_and_way_over_at_least_part_of_the_next_letter:
  - {family: qsI}
  - {family: qsAh, modifiers: [exit-extended]}
  - {family: qsUtter, modifiers: [exit-extended]}
  # `_iter_related_extension_targets` propagates qsUtter's `extend_exit_before` onto every `qsX_qsUtter` ligature, so the ligatures pick up `.exit-extended` before qsBay/qsFee/qsGay/qsThey too. The followers' entry-xheight selectors need to recognize the ligature variant the same way they recognize qsUtter.exit-extended; otherwise the join silently breaks and the extension is just a cosmetic flourish (see ·See|·Utter·Bay isolation leak).
  - {family: qsDay_qsUtter, modifiers: [exit-extended]}
  - {family: qsJai_qsUtter, modifiers: [exit-extended]}
  - {family: qsJay_qsUtter, modifiers: [exit-extended]}
  - {family: qsSee_qsUtter, modifiers: [exit-extended]}
  - {family: qsVie_qsUtter, modifiers: [exit-extended]}
  - {family: qsWay_qsUtter, modifiers: [exit-extended]}
  - {family: qsWhy_qsUtter, modifiers: [exit-extended]}
  # Superset of `reaches_up_and_way_over...`, for followers whose entry-xheight will accept any predecessor that gets up to the x-height — including ·I, whose exit is just one pixel past its own right edge. The narrower "way over" set stays the right choice for followers (qsThey, qsMay, qsThey_qsUtter) whose entry is set back far enough that only a deeply-extended predecessor exit can reach it.
  reaches_up_and_a_little_over_at_least_part_of_the_next_letter:
  - {context_set: reaches_up_and_way_over_at_least_part_of_the_next_letter}
  - {family: qsI}
  vie_may_entry_extend_triggers:
  - {family: qsPea}
  - {family: qsTea}
  - {family: qsYe}
  - {family: qsHe}
  - {family: qsIt}
  utter_reaches_way_back_after:
  - {family: qsFee, modifiers: [exit-xheight, before-utter]}
  - {family: qsMay}
  xheight_exit_reaches_into_may:
  - {family: qsFee, modifiers: [exit-xheight]}
  utter_reaches_way_back_before:
  - {family: qsSee}
  - {family: qsIng}
  - {family: qsNo}
  - {family: qsLow}
  utter_before_may:
  - {family: qsMay}
  - {family: qsMay, modifiers: [entry-baseline]}
  - {family: qsMay, modifiers: [entry-baseline, entry-extended]}
  - {family: qsMay, modifiers: [entry-baseline, exit-extended]}
  - {family: qsMay, modifiers: [entry-baseline, entry-extended, exit-extended]}
  halves_exit_xheight:
  - {family: qsPea, traits: [half]}
  - {family: qsTea, traits: [half], modifiers: [exit-xheight]}
  - {family: qsTea, traits: [half], modifiers: [entry-top, exit-xheight]}
  - {family: qsHe, traits: [half]}
  halves_exit_xheight_no_pea:
  - {family: qsTea, traits: [half], modifiers: [exit-xheight]}
  - {family: qsTea, traits: [half], modifiers: [entry-top, exit-xheight]}
  - {family: qsHe, traits: [half]}
  # The Quikscript letter families fall into three height categories:
  # - Shorts fit within the x-height (6-pixel bitmap, baseline at y=0)
  # - Talls rise from the baseline to the cap height (9-pixel bitmap)
  # - Deeps are also 9 pixels tall but sit with y_offset=-3, so they descend below the baseline
  # Regardless of whether these lists are actually used or not, the `shorts`, `deeps`, and `talls` lists are documentation that should not be deleted in scans for things to clean up.
  shorts:
  - {family: qsNo}
  - {family: qsLow}
  - {family: qsRoe}
  - {family: qsLlan}
  - {family: qsIt}
  - {family: qsEat}
  - {family: qsEt}
  - {family: qsEight}
  - {family: qsAt}
  - {family: qsI}
  - {family: qsAh}
  - {family: qsAwe}
  - {family: qsOx}
  - {family: qsOy}
  - {family: qsUtter}
  - {family: qsOut}
  - {family: qsOwe}
  - {family: qsFoot}
  - {family: qsOoze}
  talls:
  - {family: qsPea}
  - {family: qsTea}
  - {family: qsKey}
  - {family: qsThaw}
  - {family: qsFee}
  - {family: qsSee}
  - {family: qsShe}
  - {family: qsCheer}
  - {family: qsYe}
  - {family: qsHe}
  - {family: qsIng}
  - {family: qsLoch}
  - {family: qsExcite}
  deeps:
  - {family: qsBay}
  - {family: qsDay}
  - {family: qsGay}
  - {family: qsThey}
  - {family: qsVie}
  - {family: qsZoo}
  - {family: qsJai}
  - {family: qsJay}
  - {family: qsWay}
  - {family: qsWhy}
  - {family: qsMay}
  - {family: qsExam}
  # Letters whose default form does not accept a baseline cursive entry (no anchor at y=0). A preceding tall must not commit to its baseline-exit "wide" form when one of these follows, since the join cannot form anyway.
  no_baseline_join_after_tall:
  - {family: qsThaw}
  # Letters whose right side runs straight down to the baseline (or tails off down-and-to-the-right) when they exit there — so any follower with an entry that swings in from the left at the baseline can't curl behind them.
  flat_on_right_at_baseline:
  - {family: qsPea, exit_y: 0}
  - {family: qsTea, exit_y: 0}
  - {family: qsYe, exit_y: 0}
  - {family: qsHe, exit_y: 0}
  - {family: qsExcite, exit_y: 0}
  - {family: qsIt, exit_y: 0}
  - {family: qsIng, exit_y: 0}
  - {family: qsEat, exit_y: 0}
  - {family: qsEight, exit_y: 0}
  - {family: qsOx, exit_y: 0}
  - {family: qsOy, exit_y: 0}
  - {family: qsOoze, exit_y: 0}
restore_isolated_form_overrides:
  # When a forward-pair YAML `not_after` blocks an upgrade and leaves the target as bare `target`, but isolated shaping of `target follower` would render `isolated_form`, emit a post-pass rule `sub [prior_variants] target' follower_variants by isolated_form;` so the in-context render matches the isolated render. Each entry compiles to a rule under `calt_pair_guard_reflip_<target_base>`.
  - {prior: qsJay, target: qsIt, follower: qsZoo, isolated_form: qsIt.exit-baseline}
  - {prior: qsJay, target: qsIt, follower: qsNo, isolated_form: qsIt.exit-baseline}
  - {prior: qsYe, target: qsIt, follower: qsZoo, isolated_form: qsIt.exit-baseline}
  - {prior: qsYe, target: qsIt, follower: qsNo, isolated_form: qsIt.exit-baseline}
  - {prior: qsIt, target: qsIt, follower: qsZoo, isolated_form: qsIt.exit-baseline}
  - {prior: qsEat, target: qsIt, follower: qsZoo, isolated_form: qsIt.exit-baseline}
  - {prior: qsEat, target: qsIt, follower: qsNo, isolated_form: qsIt.exit-baseline}
predecessor_demote_overrides:
  # When a forward-pair lookup extends a predecessor toward a trigger that has itself become entryless (because a deeper third glyph stripped its entry), the predecessor's extension reaches into empty air. Demote the predecessor back to its isolated form so the rendered chain matches what isolated shaping of `trigger ...` would render on its own. The rule fires whenever the buffer state at this post-pass is `predecessor_form trigger_form`, which already implies the trigger is in its entryless form — no third-glyph constraint needed. Each entry compiles to a rule `sub predecessor_form' trigger_form by isolated_form;` under `calt_pred_demote_<predecessor_base>`.
  - {predecessor_form: qsExcite.entry-baseline.exit-baseline.before-vertical.noentry, trigger_form: qsGay, isolated_form: qsExcite.after-ye}
  - {predecessor_form: qsExcite.exit-baseline.before-vertical, trigger_form: qsIt, isolated_form: qsExcite}
  - {predecessor_form: qsExcite.exit-baseline.before-vertical, trigger_form: qsIt.before-utter, isolated_form: qsExcite}
  - {predecessor_form: qsExcite.exit-baseline.before-vertical, trigger_form: qsIt.exit-baseline, isolated_form: qsExcite}
  - {predecessor_form: qsExcite.exit-baseline.before-vertical, trigger_form: qsUtter.alt, isolated_form: qsExcite}
  - {predecessor_form: qsExcite.exit-baseline.before-vertical.after-baseline-letter, trigger_form: qsGay, isolated_form: qsExcite.entry-baseline.noexit}
  - {predecessor_form: qsJai.entry-xheight.exit-extended, trigger_form: qsIt.exit-baseline, isolated_form: qsJai}
  - {predecessor_form: qsJai.entry-xheight.exit-extended, trigger_form: qsTea.exit-baseline, isolated_form: qsJai}
  - {predecessor_form: qsMay.exit-baseline, trigger_form: qsGay.exit-baseline, isolated_form: qsMay}
  - {predecessor_form: qsMay.exit-extended, trigger_form: qsFee.exit-xheight, isolated_form: qsMay}
  - {predecessor_form: qsMay.exit-noentry, trigger_form: qsThey_qsUtter.noentry, isolated_form: qsMay}
  - {predecessor_form: qsNo.alt, trigger_form: qsGay.exit-baseline, isolated_form: qsNo}
  - {predecessor_form: qsNo.alt, trigger_form: qsIt.exit-baseline, isolated_form: qsNo}
  - {predecessor_form: qsNo.alt, trigger_form: qsUtter.alt, isolated_form: qsNo}
  - {predecessor_form: qsNo.exit-extended, trigger_form: qsFee.exit-xheight, isolated_form: qsNo}
  - {predecessor_form: qsWay.half, trigger_form: qsGay.exit-baseline, isolated_form: qsWay}
  - {predecessor_form: qsWay.half, trigger_form: qsGay.exit-baseline.exit-extended, isolated_form: qsWay}
  - {predecessor_form: qsWhy.half, trigger_form: qsGay.exit-baseline, isolated_form: qsWhy}
  - {predecessor_form: qsWhy.half, trigger_form: qsGay.exit-baseline.exit-extended, isolated_form: qsWhy}
trailing_demote_overrides:
  # When a forward-pair override changes a leader into an entry-preserving form with no exit, a trailing glyph may have already picked a backward upgrade based on the leader's older exit. Demote the trailing glyph back to the isolated right-half form once the leader's no-exit form is in the buffer. Each entry compiles to `sub leader_form trailing_form' by isolated_form;` under `calt_trailing_demote_<trailing_base>`.
  - {leader_form: qsIt.entry-baseline.exit-noentry.before-day-exam, trailing_form: qsDay.half, isolated_form: qsDay}
  - {leader_form: qsIt.entry-baseline.exit-noentry.before-day-exam.entry-extended, trailing_form: qsDay.half, isolated_form: qsDay}

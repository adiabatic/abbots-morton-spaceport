# Senior-only Quikscript kerning.
#
# This file is a series of `---`-separated YAML documents. Each document is one kerning rule — just the body, with no name. The build gives every rule its own unique lookup under the hood, so rules never need naming.
#
# Rules here compile into the `kern` GPOS feature for the Sans Senior fonts only (both weights). They are not applied to Sans Junior or Mono. Shared, all-proportional kerning still lives under the `kerning` key in opentype-features.yaml and applies to Junior and Senior alike; put a pair here only when it should affect the ligated Senior cut and not the unligated Junior one.
#
# `value` is in pixels (one pixel = 50 font units), multiplied by the pixel width at build time. Negative tightens, positive loosens.
#
# Left side, pick one:
#   left_family: [qsPea, ...]   # expands to the bare family glyph plus every contextual variant (qsPea, qsPea.en-y0, ...)
#   left_form: [qsNo.alt, ...]  # like left_family but matches a form sub-family: qsNo.alt and qsNo.alt.*, not qsNo or qsNo.en-ext-1 (override rule)
#   left: [qsPea, ...]          # explicit glyph names, no variant expansion
#   (omit all)                  # every glyph except those carrying this rule's per-glyph kerning tag
#
# Right side, pick one:
#   right_family: [qsTea, ...]  # expands to the bare family glyph plus every contextual variant
#   right_form: [qsNo.alt, ...] # like right_family but matches a form sub-family (override rule)
#   right: [qsTea, ...]         # explicit glyph names, no variant expansion
#   right_group: noentry        # every glyph whose name ends in `.noentry`; emits the contextual before-ZWNJ form
#
# After computing either side's glyph set, optionally carve out a sub-family:
#   except_left: [qsNo.alt, ...]   # drop every glyph matching qsNo.alt or qsNo.alt.* from the left set (pairs with a left_form override of the same prefix)
#   except_right: [qsNo.alt, ...]  # same on the right side
#
# Both sides may carry a form-prefix and/or a carve-out at once. The kerning drill-down in test/kerning.html emits exactly this when it splits an alternate-form pair (e.g. ·No·Utter) into disjoint quadrants: a "plain" side is the family minus its alternates (left_family + except_left: [qsNo.alt]), and an alternate side is its form-prefix (right_form: [qsUtter.alt]). The four quadrants partition the family×family space, so no glyph pair is kerned by two lookups. For example, the (plain ·No, alt ·Utter) quadrant:
#
# ---
# left_family: [qsNo]
# except_left: [qsNo.alt]
# right_form: [qsUtter.alt]
# value: -3
#
# Add a rule by appending a document below, for example:
#
# ---
# left_family: [qsPea]
# right_family: [qsTea]
# value: -1

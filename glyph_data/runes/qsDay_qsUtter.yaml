rune: qsDay_qsUtter
sequence: [qsDay, qsUtter]
ductus:
  full: |
    The ·Day downstroke and the ·Utter stroke drawn as one motion: straight down the left, hooking out of the descender foot and rising across to exit at the x-height on the right, where it may connect to the next letter.
  half: |
    As the full ligature, but begun from the ·Day foot hook at the baseline, then rising across to the x-height exit on the right.
stances:
  full:
    motion: full
    traits: []
    bitmap:
    - "#    ##"  #
    - "#   #  "
    - "#  #   "
    - "#  #   "
    - "# #    "
    - "# #    "  #
    - "##     "
    - "##     "
    - "#      "
    y_offset: -3
    surface:
      entries: {x-height: {x: 0, stroke: vertical}}
      exits: {x-height: {x: 7, stroke: horizontal}}
      cells: []
      unlocks: []
      require: []
  half:
    motion: half
    traits: [half]
    bitmap:
    - "     ###"  #
    - "    #   "
    - "   #    "
    - "   #    "
    - "  #     "
    - "# #     "  #
    - "##      "
    - "##      "
    - "#       "
    y_offset: -3
    surface:
      entries: {baseline: {x: 0, stroke: diagonal}}
      exits: {x-height: {x: 8, stroke: horizontal}}
      cells: []
      unlocks: []
      require: []
policy:
  order: [full, half]
  refuse: []
  prefer: []
  extend:
  - {stance: full, exit: x-height, by: 1, when: {right: {family: qsFee}}}
  - {stance: full, exit: x-height, by: 1, when: {right: {family: qsTea}, feature: ss03}}
  - stance: half
    entry: baseline
    by: 1
    when: {left: {family: [qsTea, qsYe], joined_at: baseline}}
  - {stance: half, exit: x-height, by: 1, when: {right: {family: qsFee}}}
  - {stance: half, exit: x-height, by: 1, when: {right: {family: qsTea}, feature: ss03}}
  contract: []
  resolve: []
  groups: {}

rune: qsMay
codepoint: 0xE665
ductus:
  loop: | # DRAFT — pending author sign-off
    Written clockwise, starting from the leftmost pixel at the baseline, then it continues right, loops around underneath the baseline, and then exits at the x-height on the right.
  grounded-loop: | # DRAFT — pending author sign-off
    As the loop, but the final stroke stays down and rests on the baseline at the right.
  counterclockwise:
    unrealized: true
mono:
  bitmap:
  - "   ##"  #
  - "  #  "
  - "  #  "
  - " #   "
  - " #   "
  - "#### "  #
  - " #  #"
  - " #  #"
  - "  ## "
  y_offset: -3
stances:
  loop:
    way: loop
    traits: []
    bitmap:
    - "   ##"  #
    - "  #  "
    - "  #  "
    - " #   "
    - " #   "
    - "#### "  #
    - " #  #"
    - " #  #"
    - "  ## "
    y_offset: -3
    bitmaps:
      pulled-back:
        bitmap:
        - "   # "  #
        - "  #  "
        - "  #  "
        - " #   "
        - " #   "
        - "#### "  #
        - " #  #"
        - " #  #"
        - "  ## "
        y_offset: -3
      pulled-back-stubless:
        bitmap:
        - "  # "  #
        - " #  "
        - " #  "
        - "#   "
        - "#   "
        - "### "  #
        - "#  #"
        - "#  #"
        - " ## "
        y_offset: -3
    surface:
      entries:
        baseline: {x: 0, stroke: horizontal}
        x-height: {x: 3, stroke: horizontal, joined: pulled-back, from: [{family: qsDay_qsUtter}, {family: qsThey_qsUtter}, {family: qsVie_qsUtter}, {family: qsSee_qsUtter}, {family: qsJai_qsUtter}, {family: qsJay_qsUtter}, {family: qsWay_qsUtter}, {family: qsWhy_qsUtter}, {family: qsI}, {family: qsAh}, {family: qsUtter}]}
      exits:
        x-height: {x: 5, stroke: horizontal, withdrawal: pulled-back}
      pairings:
        never: [{entry: baseline, exit: baseline}, {entry: x-height, exit: x-height}]
      cells:
      - {entry: x-height, exit: x-height-withdrawn, bitmap: pulled-back}
      unlocks: []
      require: []
  grounded-loop:
    way: grounded-loop
    traits: []
    bitmap:
    - "  ##"  #
    - " #  "
    - " #  "
    - "#   "
    - "#   "
    - "# ##"  #
    - "#  #"
    - "#  #"
    - " ## "
    y_offset: -3
    bitmaps:
      pulled-back-grounded:
        bitmap:
        - "  # "  #
        - " #  "
        - " #  "
        - "#   "
        - "#   "
        - "# ##"  #
        - "#  #"
        - "#  #"
        - " ## "
        y_offset: -3
    surface:
      entries:
        x-height: {x: 3, stroke: horizontal, joined: pulled-back-grounded, joined_x: 2, from: [{family: qsDay_qsUtter}, {family: qsThey_qsUtter}, {family: qsVie_qsUtter}, {family: qsSee_qsUtter}, {family: qsJai_qsUtter}, {family: qsJay_qsUtter}, {family: qsWay_qsUtter}, {family: qsWhy_qsUtter}, {family: qsI}, {family: qsAh}, {family: qsUtter}]}
      exits:
        baseline: {x: 4, stroke: horizontal}
      cells: []
      unlocks: []
      require: []
policy:
  order: [loop, grounded-loop]
  refuse:
  - {stance: grounded-loop, exit: baseline, when: {right: {family: [qsTea, qsDay, qsZoo, qsHe, qsNo, qsRoe, qsIt, qsEat, qsUtter, qsOoze]}}, why: These never receive ·May's grounded baseline exit. (·Tea is baseline-proven — today ·May·Tea breaks while ·May·May joins — and the off-anchor contact gate independently rejects the loop top touching the bar.)}
  - {stance: grounded-loop, exit: baseline, when: {self: {entry: live}, right: {family: [qsThaw, qsYe]}}, why: ·Thaw and ·Ye additionally reject the grounded exit when ·May is entered at the x-height.}
  prefer: []
  extend:
  - {stance: loop, exit: x-height, by: 1, ok: [1, 1], when: {right: {family: [qsDay, qsFee, qsJai, qsJay, qsRoe, qsIt]}}}
  - {stance: loop, exit: x-height, by: 1, when: {right: {family: qsTea}, feature: ss03}}
  - {stance: loop, exit: x-height, by: 1, when: {self: {entry: live}}}
  - {stance: loop, entry: baseline, by: 1, when: {left: {family: [qsPea, qsTea, qsTea_qsOy, qsYe, qsHe, qsIt], joined_at: baseline}}}
  - {stance: loop, entry: x-height, by: 1, when: {left: {class: halves-that-exit-at-x-height, joined_at: x-height}}}
  - {stance: grounded-loop, entry: x-height, by: 1, when: {left: {class: halves-that-exit-at-x-height, joined_at: x-height}}}
  contract:
  - stance: loop
    entry: x-height
    bind: pulled-back-stubless
    when: {left: {family: qsFee, joined_at: x-height}}
    why: ·Fee's long reach-over absorbs the baseline stub; the redraw spans rows, so it is a bound shape, not arithmetic.
  resolve: []
  groups: {}

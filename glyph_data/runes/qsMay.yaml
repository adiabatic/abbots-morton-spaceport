rune: qsMay
codepoint: 0xE665
ductus:
  loop: |
    Written clockwise, starting from the leftmost pixel at the baseline, then it continues right, loops around underneath the baseline, and then exits at the x-height on the right.
  grounded-loop: |
    Written counter-clockwise, from the rightmost pixel at the x-height. Goes down past the baseline, then loops back a teeny bit at the baseline and then doubles back over itself and exits on the right at the baseline.
mono:
  bitmap:
  - "   ##"  #
  - "  #  "
  - "  #  "
  - " #   "
  - " #   "
  - "#### "  #
  - " #  #"
  - " #  #"
  - "  ## "
  y_offset: -3
stances:
  loop:
    way: loop
    traits: []
    bitmap:
    - "   ##"  #
    - "  #  "
    - "  #  "
    - " #   "
    - " #   "
    - "#### "  #
    - " #  #"
    - " #  #"
    - "  ## "
    y_offset: -3
    bitmaps:
      pulled-back:
        bitmap:
        - "   # "  #
        - "  #  "
        - "  #  "
        - " #   "
        - " #   "
        - "#### "  #
        - " #  #"
        - " #  #"
        - "  ## "
        y_offset: -3
      pulled-back-stubless:
        bitmap:
        - "  # "  #
        - " #  "
        - " #  "
        - "#   "
        - "#   "
        - "### "  #
        - "#  #"
        - "#  #"
        - " ## "
        y_offset: -3
    surface:
      entries:
        baseline: {x: 0, stroke: horizontal}
        x-height:
          x: 3
          stroke: horizontal
          joined: pulled-back
          from:
          - {family: qsDay_qsUtter}
          - {family: qsThey_qsUtter}
          - {family: qsVie_qsUtter}
          - {family: qsSee_qsUtter}
          - {family: qsJai_qsUtter}
          - {family: qsJay_qsUtter}
          - {family: qsWay_qsUtter}
          - {family: qsWhy_qsUtter}
          - {family: qsI}
          - {family: qsAh}
          - {family: qsUtter}
      exits: {x-height: {x: 5, stroke: horizontal, withdrawal: pulled-back}}
      pairings: {never: [{entry: baseline, exit: baseline}, {entry: x-height, exit: x-height}]}
      cells: [{entry: x-height, exit: x-height-withdrawn, bitmap: pulled-back}]
      unlocks: []
      require: []
  grounded-loop:
    way: grounded-loop
    traits: []
    bitmap:
    - "  ##"  #
    - " #  "
    - " #  "
    - "#   "
    - "#   "
    - "# ##"  #
    - "#  #"
    - "#  #"
    - " ## "
    y_offset: -3
    bitmaps:
      pulled-back-grounded:
        bitmap:
        - "  # "  #
        - " #  "
        - " #  "
        - "#   "
        - "#   "
        - "# ##"  #
        - "#  #"
        - "#  #"
        - " ## "
        y_offset: -3
    surface:
      entries:
        x-height:
          x: 3
          stroke: horizontal
          joined: pulled-back-grounded
          joined_x: 2
          from:
          - {family: qsDay_qsUtter}
          - {family: qsThey_qsUtter}
          - {family: qsVie_qsUtter}
          - {family: qsSee_qsUtter}
          - {family: qsJai_qsUtter}
          - {family: qsJay_qsUtter}
          - {family: qsWay_qsUtter}
          - {family: qsWhy_qsUtter}
          - {family: qsI}
          - {family: qsAh}
          - {family: qsUtter}
      exits: {baseline: {x: 4, stroke: horizontal}}
      cells: []
      unlocks: []
      require: []
policy:
  order: [loop, grounded-loop]
  refuse:
  - stance: grounded-loop
    exit: baseline
    when:
      right: {family: [qsTea, qsDay, qsZoo, qsHe, qsNo, qsRoe, qsIt, qsEat, qsUtter, qsOoze]}
    why: These never receive ·May's grounded baseline exit. (·Tea is baseline-proven — today ·May·Tea breaks while ·May·May joins — and the off-anchor contact gate independently rejects the loop top touching the bar.)
  - stance: grounded-loop
    exit: baseline
    when: {self: {entry: live}, right: {family: [qsThaw, qsYe]}}
    why: ·Thaw and ·Ye additionally reject the grounded exit when ·May is entered at the x-height.
  prefer:
  - cell: {exit: baseline}
    when: {left: {is: boundary}, right: {family: qsMay}}
    why: 'Round-1 verdict on ·May·May·May·May — "the old way seems nicer to write out by hand": at word start, pair up — the grounded baseline join into the next ·May beats declining when the join counts tie.'
  - cell: {exit: baseline}
    when: {left: {family: qsMay, joined_at: none}, right: {family: qsMay}}
    why: 'Chain interior of the same verdict ("the old way seems nicer to write out by hand"): after an unjoined ·May, pair with the next ·May. The acceptance oracle''s window universe tops out at four letters, where the word-start record alone already reproduces every outcome (including the u-0341 quad flip), so this record is invisible to the divergence audit — do not delete it as redundant. Its real load is ·May chains of five or more, which without it regress to the rejected defer-to-the-tail grouping instead of the old greedy y0 | break | y0 | break pairing the shipped font draws at every length; the length-5 and length-6 settle assertions in rebuild/test_settle.py pin it. Like the word-start record, its left: condition can never match a non-·May predecessor seam.'
  extend:
  - stance: loop
    exit: x-height
    by: 1
    ok: [1, 1]
    when: {right: {family: [qsDay, qsFee, qsJai, qsJay, qsRoe, qsIt]}}
  - {stance: loop, exit: x-height, by: 1, when: {right: {family: qsTea}, feature: ss03}}
  - {stance: loop, exit: x-height, by: 1, when: {self: {entry: live}}}
  - stance: loop
    entry: baseline
    by: 1
    when: {left: {family: [qsPea, qsTea, qsTea_qsOy, qsYe, qsHe, qsIt], joined_at: baseline}}
  - stance: loop
    entry: x-height
    by: 1
    when: {left: {class: halves-that-exit-at-x-height, joined_at: x-height}}
  - stance: grounded-loop
    entry: x-height
    by: 1
    when: {left: {class: halves-that-exit-at-x-height, joined_at: x-height}}
  contract:
  - stance: loop
    entry: x-height
    bind: pulled-back-stubless
    when: {left: {family: qsFee, joined_at: x-height}}
    why: ·Fee's long reach-over absorbs the baseline stub; the redraw spans rows, so it is a bound shape, not arithmetic.
  resolve: []
  groups: {}

rune: qsMay
codepoint: 0xE665
ductus:
  loop: |
    Written clockwise, starting from the leftmost pixel at the baseline, then it continues right, loops around underneath the baseline, and then exits at the x-height on the right.
  grounded-loop: |
    Written counter-clockwise, from the rightmost pixel at the x-height. Goes down past the baseline, then loops back a teeny bit at the baseline and then doubles back over itself and exits on the right at the baseline.
mono:
  bitmap:
  - "   ##"  #
  - "  #  "
  - "  #  "
  - " #   "
  - " #   "
  - "#### "  #
  - " #  #"
  - " #  #"
  - "  ## "
  y_offset: -3
stances:
  loop:
    way: loop
    traits: []
    bitmap:
    - "   ##"  #
    - "  #  "
    - "  #  "
    - " #   "
    - " #   "
    - "#### "  #
    - " #  #"
    - " #  #"
    - "  ## "
    y_offset: -3
    bitmaps:
      pulled-back-stubless:
        bitmap:
        - "  # "  #
        - " #  "
        - " #  "
        - "#   "
        - "#   "
        - "### "  #
        - "#  #"
        - "#  #"
        - " ## "
        y_offset: -3
    surface:
      entries:
        baseline: {x: 0, stroke: horizontal}
        x-height:
          x: 3
          stroke: horizontal
          joined: pulled-back-stubless
          joined_x: 2
          from:
          - {family: qsDay_qsUtter}
          - {family: qsThey_qsUtter}
          - {family: qsVie_qsUtter}
          - {family: qsSee_qsUtter}
          - {family: qsJai_qsUtter}
          - {family: qsJay_qsUtter}
          - {family: qsWay_qsUtter}
          - {family: qsWhy_qsUtter}
          - {family: qsI}
          - {family: qsAh}
          - {family: qsUtter}
      exits: {x-height: {x: 5, stroke: horizontal}}
      pairings: {never: [{entry: baseline, exit: baseline}, {entry: x-height, exit: x-height}]}
      cells: []
      unlocks: []
      require: []
  grounded-loop:
    way: grounded-loop
    traits: []
    bitmap:
    - "  ##"  #
    - " #  "
    - " #  "
    - "#   "
    - "#   "
    - "# ##"  #
    - "#  #"
    - "#  #"
    - " ## "
    y_offset: -3
    bitmaps:
      pulled-back-grounded:
        bitmap:
        - "  # "  #
        - " #  "
        - " #  "
        - "#   "
        - "#   "
        - "# ##"  #
        - "#  #"
        - "#  #"
        - " ## "
        y_offset: -3
    surface:
      entries:
        x-height:
          x: 3
          stroke: horizontal
          joined: pulled-back-grounded
          joined_x: 2
          from:
          - {family: qsDay_qsUtter}
          - {family: qsThey_qsUtter}
          - {family: qsVie_qsUtter}
          - {family: qsSee_qsUtter}
          - {family: qsJai_qsUtter}
          - {family: qsJay_qsUtter}
          - {family: qsWay_qsUtter}
          - {family: qsWhy_qsUtter}
          - {family: qsI}
          - {family: qsAh}
          - {family: qsUtter}
      exits: {baseline: {x: 4, stroke: horizontal}}
      cells: []
      unlocks: []
      require: []
policy:
  order: [loop, grounded-loop]
  refuse:
  - stance: grounded-loop
    exit: baseline
    when:
      right: {family: [qsTea, qsDay, qsZoo, qsHe, qsNo, qsRoe, qsIt, qsEat, qsUtter, qsOoze]}
  - stance: grounded-loop
    exit: baseline
    when: {self: {entry: live}, right: {family: [qsThaw, qsYe]}}
    why: ·Thaw and ·Ye additionally reject the grounded exit when ·May is entered at the x-height.
  prefer:
  - cell: {exit: x-height}
    over: {entry: x-height}
    when: {left: {family: qsUtter}, right: {except: [family: qsTea]}}
  - {cell: {exit: baseline}, when: {left: {is: boundary}, right: {family: qsMay}}}
  - {cell: {exit: baseline}, when: {left: {family: qsMay, joined_at: none}, right: {family: qsMay}}}
  extend:
  - stance: loop
    exit: x-height
    by: 1
    ok: [1, 1]
    when: {right: {family: [qsDay, qsDay_qsUtter, qsFee, qsJai, qsJay, qsRoe, qsIt]}}
  - {stance: loop, exit: x-height, by: 1, when: {right: {family: qsTea}, feature: ss03}}
  - {stance: loop, exit: x-height, by: 1, when: {self: {entry: live}}}
  contract: []
  resolve: []
  groups: {}

rune: qsTea_qsOy
sequence: [qsTea, qsOy]
ductus:
  hapax: |
    Written as ·Tea flowing into ·Oy: the vertical bar first, from the top down through the x-height. Without lifting the pen, the small ·Oy loop is drawn clockwise around the foot of the bar, closing on it, and the stroke runs out diagonally down to the right, ending at the baseline, where it may connect to the next letter.
notes: |
  Entryless by declaration: the empty entries map is explicit so the obligation is visible (entry inheritance from the lead ·Tea cannot apply — the ligature's leftmost ink at the lead's entry heights does not match the lead's anchors). Predecessors withdraw their exits before this ligature; that is cell semantics on their side, never policy here.
stances:
  hapax:
    motion: hapax
    traits: []
    bitmap:
    - "   #    "
    - "   #    "
    - "   #    "
    - " ####   "  #
    - "#  # #  "
    - "#  #  # "
    - " ##    #"
    - "       #"
    - "       #"  #
    surface:
      entries: {}
      exits: {baseline: {x: 8, stroke: vertical, withdrawal: safe}}
      cells: []
      unlocks: []
      require: []
policy:
  order: [hapax]
  refuse: []
  prefer:
  - cell: {exit: none}
    over: {exit: baseline}
    when:
      right:
        family: [qsTea, qsIt]
        except:
        - {family: qsTea, then: {family: qsUtter, then: {family: qsLow}}}
        - family: qsTea
          then:
            family: qsUtter
            then:
              family: qsTea
              except:
              - family: qsTea
                then: {family: [qsDay, qsDay_qsUtter, qsMay, qsNo, qsLow, qsIt, qsUtter]}
    why: 'Ligature twin of qsOy.policy.prefer[0] — ligatures do not inherit component policy (proven by u-0283/u-0284/u-0285), and forming ·Tea·Oy must not change the grouping: when the groupings tie, the ligature leaves its baseline exit unrealized so the follower pair joins — "The old way seems nicer to write out by hand".'
  extend: []
  contract: []
  resolve: []
  groups: {}

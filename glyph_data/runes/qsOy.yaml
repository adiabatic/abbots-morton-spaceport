rune: qsOy
codepoint: 0xE679
ductus:
  hapax: |
    A small loop sitting at the x-height, written clockwise from its top, closing on itself; the stroke then runs out diagonally down to the right, ending at the baseline, where it may connect to the next letter. When a previous letter joins at the x-height, the loop opens on the left to receive the join.
mono:
  bitmap:
  - " #   "  #
  - "# #  "
  - " # # "
  - "    #"
  - "    #"
  - "    #"  #
stances:
  hapax:
    way: hapax
    traits: []
    bitmap:
    - " ###    "  #
    - "#  ##   "
    - "#  # #  "
    - " ##   # "
    - "       #"
    - "       #"  #
    bitmaps:
      open-on-the-left:
        bitmap:
        - "##   "  #
        - "  #  "
        - " # # "
        - "  # #"
        - "    #"
        - "    #"  #
    surface:
      entries:
        x-height:
          x: 0
          stroke: horizontal
          joined: open-on-the-left
          from:
          - family:
            - qsDay_qsUtter
            - qsGay
            - qsFee
            - qsMay
            - qsNo
            - qsLow
            - qsRoe
            - qsI
            - qsAh
            - qsUtter
            - qsOut
            joined_at: x-height
      exits: {baseline: {x: 8, stroke: vertical, withdrawal: safe}}
      cells: [{entry: x-height, exit: baseline, bitmap: open-on-the-left, exit_x: 5}]
      unlocks: []
      require: []
policy:
  order: [hapax]
  refuse: []
  prefer:
  - cell: {exit: none}
    over: {exit: baseline}
    when: {right: {family: [qsTea, qsIt]}}
    why: 'Round-1 verdict, 37 windows: when the groupings tie, ·Oy leaves its baseline exit unrealized so the follower pair joins instead — "I think I would rather prefer ·Tea·It to join" (u-0280); "The old way seems nicer to write out by hand" (the rest). Yielding, so a strict-gain ·Oy·Tea/·Oy·It join is kept.'
  extend: []
  contract: []
  resolve: []
  groups: {}

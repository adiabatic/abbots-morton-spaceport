rune: qsUtter
codepoint: 0xE67A
ductus:
  mono: |
    A short stroke begun at the bottom left, curving upwards and rightwards, to the x-height.
  alternate: |
    Begun at the top, curving leftward and downward, eventually looping around to the bottom right at the baseline. When a previous letter joins at the x-height, the pen will double back over the connecting stroke a bit.
mono:
  bitmap:
  - "   ##"  #
  - "  #  "
  - " #   "
  - " #   "
  - "#    "
  - "#    "  #
stances:
  mono:
    way: mono
    traits: []
    bitmap:
    - "   ##"  #
    - "  #  "
    - " #   "
    - " #   "
    - "#    "
    - "#    "  #
    surface:
      entries: {baseline: {x: 0, stroke: vertical}}
      exits: {x-height: {x: 5, stroke: horizontal}}
      cells: []
      unlocks: []
      require: []
  alternate:
    way: alternate
    traits: [alt]
    bitmap:
    - "  ## "  #
    - " #   "
    - "#    "
    - "#    "
    - " #   "
    - "  ###"  #
    bitmaps:
      reaches-way-back:
        bitmap:
        - "##### "  #
        - "  #   "
        - " #    "
        - " #    "
        - "  #   "
        - "   ###"  #
      reaches-way-back-withdrawn:
        bitmap:
        - "##### "  #
        - "  #   "
        - " #    "
        - " #    "
        - "  #   "
        - "   ## "  #
    surface:
      entries:
        x-height:
          x: 0
          stroke: horizontal
          joined: reaches-way-back
          from: [{family: [qsMay, qsFee], joined_at: x-height}]
      exits: {baseline: {x: 5, stroke: horizontal}}
      cells:
      - {entry: x-height, exit: baseline, bitmap: reaches-way-back, exit_x: 6}
      - {entry: x-height, exit: baseline-withdrawn, bitmap: reaches-way-back-withdrawn}
      unlocks: []
      require: [exit]
policy:
  order: [mono, alternate]
  refuse:
  - {stance: alternate, exit: baseline, when: {right: {family: [qsYe, qsHe, qsUtter]}}}
  - stance: alternate
    exit: baseline
    when: {left: {is: boundary}, right: {family: qsNo}}
    why: “un-”, as a prefix, should not use the alternate ·Utter. It says so in The Manual, on page 21.
  - stance: mono
    exit: x-height
    when: {right: {family: qsMay}}
    why: '·Utter·May joins at the baseline today (baseline E67A:E665, the old before-may stance qsUtter.alt.ex-y0 → qsMay.en-y0): ·Utter takes its alternate baseline exit into ·May, not the mono x-height exit. Refusing the mono x-height exit before ·May forces the alternate baseline join even where the mono exit would otherwise chain an extra join.'
  prefer: []
  extend:
  - {stance: mono, exit: x-height, by: 1, when: {right: {family: [qsBay, qsGay, qsThey, qsFee]}}}
  - {stance: mono, exit: x-height, by: 1, when: {right: {family: qsTea}, feature: ss03}}
  - stance: alternate
    entry: x-height
    by: 1
    when: {left: {class: halves-that-exit-at-x-height, joined_at: x-height}}
  contract: [{stance: mono, exit: x-height, by: 2, when: {right: {family: qsJai}}}]
  resolve: []
  groups: {}

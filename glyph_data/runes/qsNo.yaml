rune: qsNo
codepoint: 0xE666
ductus:
  loop: |
    Drawn clockwise from the top left, looping at the bottom, and then exiting on the top right.
  flipped: |
    As the loop, but drawn upside down: begun from the lower left, looping over the top, and exiting at the baseline on the right.  # DRAFT — pending author sign-off
mono:
  bitmap:
  - "#   #"  #
  - " # # "
  - "  #  "
  - " # # "
  - " # # "
  - "  #  "  #
stances:
  loop:
    way: loop
    traits: []
    bitmap:
    - "#   #"  #
    - " # # "
    - "  #  "
    - " # # "
    - " # # "
    - "  #  "  #
    surface:
      entries: {x-height: {x: 0, stroke: diagonal}}
      exits: {x-height: {x: 5, stroke: diagonal}}
      cells: []
      unlocks: []
      require: []
  flipped:
    way: flipped
    traits: [alt]
    bitmap:
    - "  #  "  #
    - " # # "
    - " # # "
    - "  #  "
    - " # # "
    - "#   #"  #
    surface:
      entries:
        baseline:
          x: 0
          stroke: diagonal
          from:
          - {family: [qsDay, qsVie, qsIt, qsOy, qsNo, qsUtter, qsTea_qsOy], joined_at: baseline}
      exits: {baseline: {x: 5, stroke: diagonal}}
      cells: []
      unlocks: []
      require: []
policy:
  order: [loop, flipped]
  refuse: []
  prefer:
  - {stance: flipped, when: {left: {family: qsIt}}}
  - cell: {exit: x-height}
    over: {exit: baseline}
    when: {left: {except: [family: qsIt]}, right: {family: [qsDay, qsNo, qsIt, qsOy]}}
  - cell: {exit: baseline}
    over: {exit: x-height}
    when: {left: {is: boundary}, right: {family: qsMay}}
  extend:
  - stance: loop
    entry: x-height
    by: 1
    when: {left: {class: halves-that-exit-at-x-height, joined_at: x-height}}
  - {stance: loop, exit: x-height, by: 1, when: {right: {family: qsFee}}}
  contract: [{stance: loop, exit: x-height, by: 1, when: {right: {family: qsJai}}}]
  resolve: []
  groups: {}

rune: qsDay
codepoint: 0xE653
ductus:
  full: |
    A single stroke straight down the left from the x-height through the baseline, then a hook out of the foot kicking up and to the right toward the baseline, where it may connect to the next letter.
  half: |
    As the full way, but only the foot hook is drawn: begun at the baseline on the left, dropping into the descender and kicking back up to the right.
mono:
  bitmap:
  - "#    "  #
  - "#    "
  - "#    "
  - "#    "
  - "#    "
  - "#  # "  #
  - "# #  "
  - "##   "
  - "#    "
  y_offset: -3
stances:
  full:
    way: full
    traits: []
    bitmap:
    - "#   "  #
    - "#   "
    - "#   "
    - "#   "
    - "#   "
    - "#  #"  #
    - "# # "
    - "##  "
    - "#   "
    y_offset: -3
    surface:
      entries: {x-height: {x: 0, stroke: vertical}}
      exits: {baseline: {x: 4, stroke: diagonal}}
      cells: []
      unlocks: []
      require: []
  half:
    way: half
    traits: [half]
    bitmap:
    - "    "  #
    - "    "
    - "    "
    - "    "
    - "    "
    - "#  #"  #
    - "# # "
    - "##  "
    - "#   "
    y_offset: -3
    surface:
      entries: {baseline: {x: 0, stroke: diagonal}}
      exits: {baseline: {x: 4, stroke: diagonal}}
      cells: []
      unlocks: []
      require: []
policy:
  order: [full, half]
  refuse: [{stance: half, entry: baseline, when: {left: {family: qsWay}}}]
  prefer:
  - cell: {exit: none}
    over: {exit: baseline}
    when: {right: {family: qsIt, then: {family: [qsDay, qsDay_qsUtter, qsUtter]}}}
  - cell: {exit: none}
    over: {exit: baseline}
    when:
      self: {entry: none}
      right: {family: qsTea, then: {family: [qsDay, qsDay_qsUtter, qsIt, qsUtter]}}
  - cell: {exit: none}
    over: {exit: baseline}
    when: {right: {family: qsTea, then: {family: qsMay}}}
  - cell: {exit: none}
    over: {exit: baseline}
    when:
      left: {family: qsTea, joined_at: baseline}
      right: {family: qsTea, then: {family: [qsDay, qsDay_qsUtter, qsIt, qsUtter]}}
  - cell: {exit: none}
    over: {exit: baseline}
    when:
      left: {family: [qsIt, qsUtter]}
      right: {family: qsTea, then: {family: [qsDay, qsDay_qsUtter, qsUtter]}}
  extend:
  - stance: half
    entry: baseline
    by: 1
    when: {left: {family: [qsTea, qsYe], joined_at: baseline}}
  contract: []
  resolve: []
  groups: {}

rune: qsDay
codepoint: 0xE653
ductus:
  full: |
    A single stroke straight down the left from the x-height through the baseline, then a hook out of the foot kicking up and to the right toward the baseline, where it may connect to the next letter.
  half: |
    As the full motion, but only the foot hook is drawn: begun at the baseline on the left, dropping into the descender and kicking back up to the right.
mono:
  bitmap:
  - "#    "  #
  - "#    "
  - "#    "
  - "#    "
  - "#    "
  - "#  # "  #
  - "# #  "
  - "##   "
  - "#    "
  y_offset: -3
stances:
  full:
    motion: full
    traits: []
    bitmap:
    - "#   "  #
    - "#   "
    - "#   "
    - "#   "
    - "#   "
    - "#  #"  #
    - "# # "
    - "##  "
    - "#   "
    y_offset: -3
    surface:
      entries: {x-height: {x: 0, stroke: vertical}}
      exits: {baseline: {x: 4, stroke: diagonal}}
      cells: []
      unlocks: []
      require: []
  half:
    motion: half
    traits: [half]
    bitmap:
    - "    "  #
    - "    "
    - "    "
    - "    "
    - "    "
    - "#  #"  #
    - "# # "
    - "##  "
    - "#   "
    y_offset: -3
    surface:
      entries: {baseline: {x: 0, stroke: diagonal}}
      exits: {baseline: {x: 4, stroke: diagonal}}
      cells: []
      unlocks: []
      require: []
policy:
  order: [full, half]
  refuse: [{stance: half, entry: baseline, when: {left: {family: qsWay}}}]
  prefer:
  - cell: {exit: none}
    over: {exit: baseline}
    when: {right: {family: qsIt, then: {family: [qsDay, qsDay_qsUtter, qsUtter]}}}
  - cell: {exit: none}
    over: {exit: baseline}
    when:
      self: {entry: none}
      right:
        family: qsTea
        then: {family: qsUtter, except: [{family: qsUtter, then: {family: qsLow}}]}
  - cell: {exit: none}
    over: {exit: baseline}
    when: {right: {family: qsTea, then: {family: [qsDay, qsDay_qsUtter, qsMay, qsLow, qsIt]}}}
  - cell: {exit: none}
    over: {exit: baseline}
    when:
      right: {family: qsTea, then: {family: qsNo, then: {family: [qsTea, qsMay, qsLow, qsAh]}}}
    why: '`·Day ~b~ ·Tea` is less pleasant to write than `·Tea ~b~ ·No.alt`'
  - cell: {exit: none}
    over: {exit: baseline}
    when: {right: {family: qsTea, then: {family: qsNo, then: {is: boundary}}}}
  - cell: {exit: none}
    over: {exit: baseline}
    when:
      self: {entry: live}
      right:
        family: qsTea
        then:
          family: qsUtter
          except:
          - {family: qsUtter, then: {family: qsLow}}
          - family: qsUtter
            then:
              family: qsTea
              except:
              - family: qsTea
                then:
                  family: [qsDay, qsDay_qsUtter, qsMay, qsNo, qsLow, qsIt, qsAh, qsUtter]
    why: '`·Day ~b~ ·Tea` is less pleasant to write than `·Tea ~b~ ·Utter`'
  extend:
  - stance: half
    entry: baseline
    by: 1
    when: {left: {family: [qsTea, qsYe], joined_at: baseline}}
  contract: []
  resolve: []
  groups: {}

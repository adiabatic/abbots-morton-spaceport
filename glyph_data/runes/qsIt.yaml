rune: qsIt
codepoint: 0xE670
ductus: {bar: "- Either written from top to bottom or bottom to top.\n"}
mono:
  bitmap:
  - "  #  "  #
  - "  #  "
  - "  #  "
  - "  #  "
  - "  #  "
  - "  #  "  #
stances:
  bar:
    way: bar
    traits: []
    bitmap:
    - "#"  #
    - "#"
    - "#"
    - "#"
    - "#"
    - "#"  #
    surface:
      entries: {baseline: {x: 0, stroke: vertical}, x-height: {x: 0, stroke: vertical}}
      exits:
        baseline: {x: 1, stroke: vertical, withdrawal: safe}
        x-height: {x: 1, stroke: vertical, withdrawal: safe}
      pairings:
        # The ductus's old join-constraint bullets, relocated: joined at one height, ·It joins onward only at the other; same-height pass-through exists only behind the ss04 unlocks below.
        only:
        - {entry: x-height, exit: baseline}
        - {entry: x-height, exit: none}
        - {entry: baseline, exit: x-height}
        - {entry: baseline, exit: none}
        - {entry: none, exit: x-height}
        - {entry: none, exit: baseline}
        - {entry: none, exit: none}
      cells: []
      # The except carve-outs carry the old ss04 stances' inherited not_after/not_before lists; the before-·Day row drops the old `entry_y: 5` narrowing on its trigger as pre-lookup trivia (the settled follower is the half ·Day).
      unlocks:
      - pairing: {entry: baseline, exit: baseline}
        feature: ss04
        when: {left: {family: qsDay}, right: {except: [family: qsDay]}}
      - pairing: {entry: baseline, exit: baseline}
        feature: ss04
        when:
          left: {except: [family: qsJay, family: qsYe, family: qsIt, family: qsEat]}
          right: {family: qsLow, class: can-enter-at-baseline}
      - pairing: {entry: baseline, exit: baseline}
        feature: ss04
        when:
          left: {except: [family: qsJay, family: qsYe, family: qsIt, family: qsEat]}
          right: {family: qsDay}
      - pairing: {entry: baseline, exit: baseline}
        feature: ss04
        when:
          left: {except: [class: utter-pass-through-vetoes]}
          right: {family: qsUtter, class: can-enter-at-baseline}
      require: []
policy:
  refuse:
  - {entry: x-height, when: {left: {family: qsIt}}}
  - entry: baseline
    when: {left: {family: qsIt}}
    why: ·It never joins to itself. Retires the round-1 entered-it-baseline-join-gain approvals and deliberately forgoes the old font's lone real ·It·It chain (ss04, before ·Utter).
  - {stance: bar, exit: x-height, when: {right: {family: [qsDay, qsDay_qsUtter]}}}
  - {exit: x-height, when: {self: {entry: none}, right: {family: [qsZoo, qsYe]}}}
  - {exit: x-height, when: {self: {entry: none}, left: {family: qsOwe}}}
  - {exit: x-height, when: {self: {entry: live}, left: {family: [qsJay, qsYe, qsIt, qsEat]}}}
  - stance: bar
    exit: baseline
    when: {self: {entry: none}, right: {family: [qsTea, qsRoe, qsIt]}}
    why: Two adjacent verticals joined at the baseline render as one extra-thick stroke.
  - exit: baseline
    when:
      self: {entry: none}
      left: {family: [qsBay, qsDay, qsGay, qsShe]}
      right: {except: [family: qsDay, family: qsDay_qsUtter, family: qsUtter]}
  - stance: bar
    exit: baseline
    when:
      self: {entry: none}
      left: {family: [qsZoo, qsShe, qsEat, qsOwe]}
      right: {family: qsUtter}
  - stance: bar
    exit: baseline
    when: {self: {entry: live}, left: {family: qsDay, stance: half}, right: {family: qsUtter}}
  prefer:
  - cell: {exit: none}
    over: {exit: x-height}
    when: {left: {family: qsOy, joined_at: baseline}, right: {family: qsNo}}
  extend:
  # The old YAML's halves-minus-qsPea x-height entry-extension record was transcribed here for M1 and deleted in the round-1 verdict pass: the shipped font never realizes it (probed: both ·Tea·It and ·He·It join un-extended today), and the reviewer rejected every window where M1 realized it — "this widens the ·Tea·It extension for no reason".
  - {stance: bar, entry: baseline, by: 1, when: {left: {family: qsKey, joined_at: baseline}}}
  - stance: bar
    exit: baseline
    by: 1
    when:
      self: {entry: live}
      left: {joined_at: x-height}
      right: {except: [family: qsDay, family: qsDay_qsUtter, family: qsMay, family: qsUtter]}
  - {stance: bar, exit: baseline, by: 1, when: {self: {entry: none}, right: {family: qsI}}}
  - {stance: bar, exit: baseline, by: 1, when: {right: {family: [qsJai, qsCheer, qsOwe]}}}
  - {stance: bar, exit: x-height, by: 1, when: {right: {family: [qsZoo, qsJai, qsCheer, qsOwe]}}}
  contract: []
  resolve: []
  groups:
    utter-pass-through-vetoes:
      union: [{family: qsZoo, trait: half}, family: qsShe, family: qsYe, family: qsOwe]

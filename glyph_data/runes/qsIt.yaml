rune: qsIt
codepoint: 0xE670
ductus:
  bar: |
    - Either written from top to bottom or bottom to top.
mono:
  bitmap:
  - "  #  "  #
  - "  #  "
  - "  #  "
  - "  #  "
  - "  #  "
  - "  #  "  #
stances:
  bar:
    way: bar
    traits: []
    bitmap:
    - "#"  #
    - "#"
    - "#"
    - "#"
    - "#"
    - "#"  #
    surface:
      entries:
        baseline: {x: 0, stroke: vertical}
        x-height: {x: 0, stroke: vertical}
      exits:
        baseline: {x: 1, stroke: vertical, withdrawal: safe}
        x-height: {x: 1, stroke: vertical, withdrawal: safe}
      pairings:
        # The ductus's old join-constraint bullets, relocated: joined at one height, ·It joins onward only at the other; same-height pass-through exists only behind the ss04 unlocks below.
        only:
        - {entry: x-height, exit: baseline}
        - {entry: x-height, exit: none}
        - {entry: baseline, exit: x-height}
        - {entry: baseline, exit: none}
        - {entry: none, exit: x-height}
        - {entry: none, exit: baseline}
        - {entry: none, exit: none}
      cells: []
      # The except carve-outs carry the old ss04 stances' inherited not_after/not_before lists; the before-·Day row drops the old `entry_y: 5` narrowing on its trigger as pre-lookup trivia (the settled follower is the half ·Day).
      unlocks:
      - {pairing: {entry: baseline, exit: baseline}, feature: ss04, when: {left: {family: qsDay}, right: {except: [{family: qsDay}]}}}
      - {pairing: {entry: baseline, exit: baseline}, feature: ss04, when: {left: {except: [{family: qsJay}, {family: qsYe}, {family: qsIt}, {family: qsEat}]}, right: {family: qsLow, class: can-enter-at-baseline}}}
      - {pairing: {entry: baseline, exit: baseline}, feature: ss04, when: {left: {except: [{family: qsJay}, {family: qsYe}, {family: qsIt}, {family: qsEat}]}, right: {family: qsDay}}}
      - {pairing: {entry: baseline, exit: baseline}, feature: ss04, when: {left: {except: [{class: utter-pass-through-vetoes}]}, right: {family: qsUtter, class: can-enter-at-baseline}}}
      require: []
policy:
  refuse:
  - {entry: x-height, when: {left: {family: qsIt}}}
  - stance: bar
    exit: x-height
    when: {right: {family: qsDay}}
    why: ·It reaches ·Day only at the baseline, into the half ·Day; the x-height join into the full ·Day's entry is the forbidden same-height pass-through.
  - {exit: x-height, when: {self: {entry: none}, right: {family: [qsZoo, qsYe]}}}
  - {exit: x-height, when: {self: {entry: none}, left: {family: qsOwe}}}
  - {exit: x-height, when: {self: {entry: live}, left: {family: [qsJay, qsYe, qsIt, qsEat]}}}
  - stance: bar
    exit: baseline
    when: {self: {entry: none}, right: {family: [qsTea, qsRoe, qsIt]}}
    why: Two adjacent verticals joined at the baseline render as one extra-thick stroke.
  - {exit: baseline, when: {self: {entry: none}, left: {family: [qsBay, qsDay, qsGay, qsShe]}, right: {except: [{family: qsDay}, {family: qsUtter}]}}}
  - stance: bar
    exit: baseline
    when: {self: {entry: none}, left: {family: [qsZoo, qsShe, qsIt, qsEat, qsOwe]}, right: {family: qsUtter}}
    why: Carried from today's before-·Utter stance ("needed to make words ending in -ian look right"); these predecessors veto the unentered ·It·Utter baseline join.
  prefer: []
  extend:
  # Transcribed faithfully from the old YAML even though the probed ·Tea.half·It window today shows no entry extension; the E-UNREALIZED gap gate and the divergence ledger arbitrate (M1 plan, section 5 authoring note).
  - {stance: bar, entry: x-height, by: 1, when: {left: {class: halves-that-exit-at-x-height, except: [{family: qsPea}], joined_at: x-height}}}
  - {stance: bar, entry: baseline, by: 1, when: {left: {family: qsKey, joined_at: baseline}}}
  - {stance: bar, exit: baseline, by: 1, when: {self: {entry: live}}}
  - {stance: bar, exit: baseline, by: 1, when: {self: {entry: none}, right: {family: qsI}}}
  - {stance: bar, exit: baseline, by: 1, when: {right: {family: [qsJai, qsCheer, qsOwe]}}}
  - {stance: bar, exit: x-height, by: 1, when: {right: {family: [qsZoo, qsJai, qsCheer, qsOwe]}}}
  contract: []
  resolve: []
  groups:
    utter-pass-through-vetoes: {union: [{family: qsDay, trait: half}, {family: qsZoo, trait: half}, {family: qsShe}, {family: qsYe}, {family: qsOwe}]}

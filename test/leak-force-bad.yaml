# Per-signature force-bad blocklist for the shaping-leak classifier (decision 11 of doc/definitions/shaping-leakage.md).
#
# The mechanical proxy in tools/leak_classify.py reads the break-facing edge of the *changed* flanking form. It is structurally blind to the cross-lookup-compose leak where the changed side strips to *bare* while an unchanged ligature neighbor (qsTea_qsOy, qsThey_qsZoo, qsSee_qsEat, qsOut_qsTea) absorbs the join — there the visible defect sits on the neighbor, not the changed edge. Each entry here condemns one exact swap so the loop treats it as a defect to fix; force-bad outranks every force-benign signal.
#
# Each signature is [isolated_left, left_chosen, isolated_right, right_chosen] — the same 4-tuple the snapshot keys on.

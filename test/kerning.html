<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kerning — Abbots Morton Spaceport</title>
    <link rel="stylesheet" href="shared.css" />
    <style>
      :root {
        --font-stack: "Abbots Morton Spaceport Sans Senior", "Departure Mono", monospace;
        --font-size: 22px;
      }

      body {
        font-size: var(--font-size);
      }

      .matrix {
        border-collapse: collapse;

        th, td {
          padding: 2px 4px;
          text-align: center;
          border: 2px solid light-dark(#ddd, #444);
          font-size: var(--font-size);
          font-family: var(--font-stack);
          font-weight: var(--font-weight, 400);
          -webkit-font-smoothing: none;
          -moz-osx-font-smoothing: grayscale;
          font-smooth: never;
        }

        th {
          background: light-dark(#e8e8e8, #333);
          font-size: 11px;
          font-family: inherit;
        }

        thead th {
          position: sticky;
          top: 0;
          z-index: 2;
        }

        thead th:first-child {
          z-index: 3;
        }

        tbody th {
          position: sticky;
          left: 0;
          z-index: 1;
        }

        td {
          white-space: nowrap;
        }

        .boundary-left {
          border-left-width: 3px;
          border-left-color: light-dark(#999, #666);
        }

        .boundary-right {
          border-right-width: 3px;
          border-right-color: light-dark(#999, #666);
        }

        .boundary-top {
          border-top-color: light-dark(#999, #666);
        }

        .boundary-bottom {
          border-bottom-color: light-dark(#999, #666);
        }
      }
    </style>
    <script type="module">
      import { LETTERS, initToggles } from "./shared.js";

      const table = document.getElementById("matrix-table");
      const VOWEL_FIRST_CODE = 0xe670;
      const CONSONANT_LAST_CODE = 0xe66c;

      function buildTable() {
        table.innerHTML = "";

        const thead = document.createElement("thead");
        const headerRow = document.createElement("tr");
        const corner = document.createElement("th");
        corner.textContent = "·X·Y";
        headerRow.appendChild(corner);
        for (const col of LETTERS) {
          const th = document.createElement("th");
          th.textContent = String.fromCodePoint(col.code);
          th.title = `·${col.name}`;
          if (col.code === VOWEL_FIRST_CODE) th.classList.add("boundary-left");
          if (col.code === CONSONANT_LAST_CODE) th.classList.add("boundary-right");
          headerRow.appendChild(th);
        }
        thead.appendChild(headerRow);
        table.appendChild(thead);

        const tbody = document.createElement("tbody");
        for (const row of LETTERS) {
          const tr = document.createElement("tr");
          const rowAtVowelStart = row.code === VOWEL_FIRST_CODE;
          const rowAtConsonantEnd = row.code === CONSONANT_LAST_CODE;
          const th = document.createElement("th");
          th.textContent = String.fromCodePoint(row.code);
          th.title = `·${row.name}`;
          if (rowAtVowelStart) th.classList.add("boundary-top");
          if (rowAtConsonantEnd) th.classList.add("boundary-bottom");
          tr.appendChild(th);
          for (const col of LETTERS) {
            const td = document.createElement("td");
            td.textContent = String.fromCodePoint(col.code, row.code);
            td.title = `·${col.name}·${row.name}`;
            if (col.code === VOWEL_FIRST_CODE) td.classList.add("boundary-left");
            if (col.code === CONSONANT_LAST_CODE) td.classList.add("boundary-right");
            if (rowAtVowelStart) td.classList.add("boundary-top");
            if (rowAtConsonantEnd) td.classList.add("boundary-bottom");
            tr.appendChild(td);
          }
          tbody.appendChild(tr);
        }
        table.appendChild(tbody);
      }

      buildTable();

      initToggles({
        sizeToggle: "size-toggle",
        fontOrderToggle: "font-order-toggle",
        fontToggle: "font-toggle",
        levelToggle: "level-toggle",
        weightToggle: "weight-toggle",
      });
    </script>
  </head>
  <body>
    <h1>Kerning</h1>

    <div class="toggle-buttons">
      <div id="size-toggle" class="size-control">
        <button class="size-down">&minus;</button>
        <span class="size-display">22px</span>
        <button class="size-up">+</button>
      </div>
      <button id="font-order-toggle">AMS first</button>
      <button id="font-toggle">Sans</button>
      <button id="level-toggle">Senior</button>
      <button id="weight-toggle">Regular</button>
    </div>

    <div class="matrix-scroll">
      <table class="matrix" id="matrix-table"></table>
    </div>

    <footer>
      <a href="index.html">Font Test</a> |

    </footer>
  </body>
</html>

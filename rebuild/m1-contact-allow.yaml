# Declined-exit terminals for ·Utter, ·No, ·Day, ·Day·Utter, and ·May (E-DANGLE, design doc section 9 "declined side has reaching ink and no withdrawal binding"). The legacy shipped font draws each of these letters' exit terminal unconditionally — isolated, word-final, and before a non-joining follower alike — and never carried a pulled-back retraction (no such shape exists in quikscript.yaml). The rebuild rune briefly added an exit-side `withdrawal: pulled-back` that retracted the terminal on every decline; removing it restores the old letterform. The reaching pixel does not continue vertically, so it cannot earn the automatic `withdrawal: safe` proof; these blessings record that the terminal is intentional letterform ink, not a stranded connector. One signature per stance/entry/lock/extend variant the gate inspects separately; all are the same one-pixel terminal.


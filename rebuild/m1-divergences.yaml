  why: |
    Round-1 verdict: rejected — the bulk of the class (qsIt's transcribed halves-minus-qsPea x-height entry-extension record, 1,055 of the original 1,218 rows) was reverted by deleting that record; the shipped font never realized it ("this widens the ·Tea·It extension for no reason"). The surviving rows are two documented residues. (1) The exemplar's phenomenon: under ss03, when ·May joins from ·Pea/·Tea at the baseline and also extends its x-height exit toward a following half-·Tea, settlement composes en-ext-1 + ex-ext-1 on one cell where today's cascade drops the entry extension; the verdict signal there is contradictory (10 rejects on ·Pea·May·Tea-shaped words against u-0468's approval and the 40 ss03-chain approvals of the identical cell), no clean revert exists in the closed when: vocabulary (entry-side extend and contract do not net at name grain), and one question is open with the user — keep the composed extension everywhere, or feature-scoped engine work to drop it. (2) Regrouping residuals: in [X]·Oy·It·May shapes the round-1 restored ·It·May baseline join carries ·May's en-ext-1 because "the predecessor's predecessor is entered" is not expressible in the closed when: vocabulary; the residual is the same single-extension connector approved 28 times in same-seam-extension-non-summing.
    Round-2 verdict: the round-1 open question resolves toward reject. The user re-triaged both residues and rejected them firmly — 15 ·Pea·May·Tea-under-ss03 windows ("pea-may": the composed en-ext-1 + ex-ext-1) and 12 [X]·Oy·It·May windows ("it-may": the restored ·It·May baseline join's en-ext-1) — 27 reject units in this class. The round-1 contradiction is now understood, not contradictory: the approved siblings (u-0393 ·Pea·May·Tea·Tea, u-0468) are the cases where ·May pulls back and never composes ex-ext-1, so they carry no summed extension; the user rejects the summing and keeps the single extension. An exhaustive, build-tested lever hunt (25 candidate records across 5 independent lever families — qsMay right/self-scoped suppression, extend-narrowing + non-summing, qsPea/qsTea predecessor-exit, qsIt two-side, ligature/same-seam — each scratch-built against a harness proven byte-identical to the oracle) found zero closed-vocabulary record that reverts any reject to old ink without collateral. The wall is a depth-2 left-context predicate the frozen when: grammar cannot express: for "pea-may", ·May's immediate-left predecessor is byte-identical (qsPea, full, baseline exit, vertical, joined_at baseline) in the bare reject and the APPROVED ·Pea·Pea·May·Tea, differing only in the predecessor's own entry (none vs y6); for "it-may" it is the predecessor's predecessor (·Oy), and the reject ·Oy·It·May is ink-identical to the approved ·Oy·It·May·Tea but for the 4th glyph. The token grammar compounds it: an extend always emits en-ext-1 (a competing more-specific extend re-emits it — build-confirmed 0 collateral but 0 revert), a contract coexists without netting (round-1's result, reproduced as 51 unmatched), and a refuse collapses the whole ·Pea→·May / ·It→·May cell rather than dropping the token. Disposition: no records authored; the class stays reviewed-rejected with these 27 windows as the documented engine-limited residue. Honoring the verdicts is one coherent feature
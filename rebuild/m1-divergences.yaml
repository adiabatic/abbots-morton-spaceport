- id: ss10-isolation-completed
  status: intended
  match: {predicate: ss10_isolation_completed, configs: [ss10]}
  count: 0
  exemplars:
    - {config: ss10, codepoints: "E665:E653", baseline: "qsMay|qsDay (joined y5)", new: "qsMay/loop/None/None/|qsDay/full/None/None/ (break)"}
    - {config: ss10, codepoints: "E666:E666", baseline: "qsNo|qsNo (joined y5)", new: "qsNo/loop/None/None/|qsNo/loop/None/None/ (break)"}
  why: |
    The ss10 isolated overlay (conform._compare_row, the isolated_overlay_active branch) renders every letter as its anchor-free default-stance cell, so under ss10 the new font breaks every seam by design ("every seam visually a break"). The old shipped font's ss10 feature was authored before this batch's qsDay/qsNo/qsUtter — and predates qsLow the same way, whose entry/exit anchors ride its base cmap glyph — and never extended to isolate them, so under ss10 the old font still draws their cursive joins on the bare cmap glyphs (verified in the baseline subset: qsMay|qsDay, qsNo|qsNo, and qsPea|qsLow all carry a y5-or-y0 seam under ss10, while every existing|existing pair breaks). Every row here is therefore old-font-joins / new-font-breaks on a seam touching one of the new runes — the new overlay completing an isolation the old font left incomplete. The predicate requires every lost seam to neighbor a new rune, so a hypothetical existing|existing ss10 regression would stay unmatched and fail rather than be absorbed. Windows whose ligature pair actually forms now diverge at ligation grain instead (under ss10 the new font never forms the ligature at all) and ride the sibling ss10-ligature-suppressed class below. Verification is mechanized as the Junior-equivalence oracle (rebuild.review.ink.JuniorOracle): a unit divergent only under ss10 is machine-approved when the rebuild's ss10 rendering is placed-ink-identical to the shipped Junior font — the canonical isolated rendering — once Junior's uniform one-pixel-per-letter tracking is removed, so "fully isolated" is proven per unit against Junior's actual pixels rather than blanket-exempted.

- id: ss10-ligature-suppressed
  status: intended
  match: {predicate: ss10_ligature_suppressed, configs: [ss10]}
  count: 520
  exemplars:
    - {config: ss10, codepoints: "E653:E67A", baseline: "qsDay_qsUtter (the ligature glyph)", new: "qsDay/full/None/None/|qsUtter/mono/None/None/ (two bare letters)"}
    - {config: ss10, codepoints: "E652:E679:E67A", baseline: "qsTea_qsOy|qsUtter (ligature, joined)", new: "qsTea/full/None/None/|qsOy/hapax/None/None/|qsUtter/mono/None/None/ (all bare)"}
  why: |
    The 2026-07-04 ratification from the blessing pass's ~160 verdict notes ("Under ss10 these must be fully isolated; old font joins them, new font ligates them — both wrong", "ss10 join suppression also means don't ligate"): under the isolated overlay a ligature-forming pair renders as its components' anchor-free letter twins, so every letter stands alone. Formation stays unconditional for every other configuration, but under ss10 it never fires at all: the pre-empt lookup (emit_gsub's m1_ss10_isolated_input, defined before m1_formation so its LookupList index is lower) substitutes every letter's raw cmap glyph by its `.ss10` twin first, and the twins appear in no formation sequence, marker line, chokepoint class, or settlement input — no ligature ever exists in an ss10 buffer and each letter keeps its own cluster. The old font forms qsDay_qsUtter and qsTea_qsOy under ss10 and keeps drawing their seams, so every ss10 window containing a formable E653:E67A or E652:E679 adjacency diverges at ligation grain — the old row carries the ligature glyph, the new rendering has one more glyph per formed pair. The classifier routes these ahead of marker-staging-ligature-formation (whose 00B7 arm would otherwise absorb the namer-dot ss10 windows) and only for config ss10 with a formable pair in the window; an ss10 ligation divergence without such a pair stays unmatched and fails rather than be absorbed. Boundary windows (space/ZWNJ) stay on the boundary-echo blanket, which outranks every cell/seam/ligation-grain class. Like the sibling ss10-isolation-completed class, these units machine-approve through the Junior-equivalence oracle (rebuild.review.ink.JuniorOracle) when the rebuild's ss10 rendering matches the shipped Junior font's isolated pixels with Junior's tracking removed; on the 2026-07-04 surface the oracle agreed with all 2,391 recorded human approvals of ss10-only units and refused only the five lowered-namer-dot boundary windows.


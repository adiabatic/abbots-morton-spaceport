  why: |
    The deterministic ranking (optimistic third term, then order:, then the structural floor) regroups chains today's greedy cascade pairs differently. 428 of the 435 rows carry exactly one seam gain and one seam loss — the same number of joins on a different seam, section 15.4 do-not-care drift. The remaining 7 rows are the single window ·Oy·Tea·May·May across the seven letter-shaping configurations (default, ss02, ss03, ss04, ss05, ss02+ss03, ss02+ss03+ss05), where today's cascade lands one realized join (Tea·May at the baseline; the May·May y5 exit dangles before the bare final May) and settlement regroups to two (Oy·Tea and May·May, both at the baseline) — two gains against one loss, a net join gain from the same regrouping mechanism. Every member row is itemized in the audit TSV.

- id: may-quad-order-deferral
  status: drift-accepted
  match: {predicate: may_quad_order_deferral, configs: all}
  count: 7
  exemplars:
    - {config: default, codepoints: "E665:E665:E665:E665", baseline: "qsMay.ex-y0|qsMay.en-y0.ex-y5|qsMay.ex-y0|qsMay.en-y0.ex-y5 (y0,break,y0)", new: "withdrawn|withdrawn|qsMay.grounded-loop.ex-y0|qsMay.loop.en-y0 (break,break,y0)"}
  why: |
    In the all-·May quad, the three-token window ties the join-now grounded candidate against the deliberately optimistic decline prospect at every position, and ·May's authored order: (loop before grounded-loop) breaks each tie toward declining — so the chain commits only the final pair where the optimism runs out, one join fewer than today's greedy pairing. Window-local ranking is the design's deliberate commitment (sections 6.1 and 7); this is its one observed cost in the M1 alphabet (a single window per configuration). Flagged for review at qsMay's next policy pass — a yielding prefer on the grounded join would recover the pairing without touching the ss03 order-decided cases.


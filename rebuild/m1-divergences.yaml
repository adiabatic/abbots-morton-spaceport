  why: |
    The old YAML places the not_before [qsTea, qsIt, qsRoe] baseline-exit refusal on the unentered stance only (quikscript.yaml entry_nowhere_exit_baseline; the entered en-y5/ex-y0 stance carries no such refusal), so the authored self-scoped refusal is faithful and an entered ·It legally joins a following ·It/·Tea at the baseline. Today's break is a cascade artifact, not authored law; the extended exit (ex-ext-1, the entered-exit extension) keeps the two verticals two columns apart, so the why of the refusal (one extra-thick stroke) does not apply. Off-anchor contact gate clean over these cells. Every member row's gained seam has an entered ·It on its left (the classifier routes unentered-·It gains — the ss03 ·It·May·Tea chains — to ss03-chain-join-gains instead, and an unentered-·It gain outside ss03 matches nothing and fails).


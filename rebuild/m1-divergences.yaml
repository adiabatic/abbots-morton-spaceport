    Under ss03 the window join-count maximization buys chains today's one-pair-at-a-time cascade cannot see. Two shapes, one mechanism: ·Tea·May·Tea and ·May·May·Tea gain the second join on the ·May·Tea side (prototype deviation 3 / M1-PLAN expected class 7), and ·It·May·Tea gains the first join — today ·May wears the entryless after-xheight-exit stance toward the half-·Tea, so the unentered ·It cannot reach it; settlement's ·May cell carries both anchors (en-y0 and the extended ex-y5), so the ·It·May baseline join lands alongside the kept ·May·Tea join. 36 of the 120 rows are the ·It·May·Tea shape (12 per ss03-bearing configuration).


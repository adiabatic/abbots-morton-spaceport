    Resolution (baseline-entry removal): the round-2 engine-limited residue — the 15 "pea-may" and 12 "it-may" windows — is gone, without the engine milestone. Removing qsMay's baseline-entry extend record makes ·May's baseline entry never extend, so those windows reconverge to the old ink at the entry seam and leave this class; the pixel the old font drew in ordinary words is now recorded as the intended may-baseline-entry-extension-dropped. What remains in this class is the surviving x-height entry-extension (the halves-that-exit-at-x-height record on the follower) — the new exemplar ·Day·Utter·May, where ·May's x-height entry extends after the ligature's x-height exit.
    Resolution (record deletion): all ten transcribed records of the shape are gone. The oracle-proven parity-reverts (qsDay, qsOy, both qsPea stances, qsMay's grounded-loop, qsDay_qsUtter's own, and the never-firing qsTea/qsUtter twins) were deleted outright; ·No's record — half-real, since the old font draws its extension after half-·Pea and half-·Tea — fell to the no-xheight-entry-extension-dropped adjudication, and ·May's loop record to may-ligature-seam-loosened. The 3 surviving rows are the ss03 composition where the ligature's kept baseline en-ext-1 sums with its own exit extension on one cell while the old font drops the entry side — the ligature cousin of the same-seam non-summing engine wall.

- id: same-seam-extension-non-summing
  status: reviewed-approved
  match: {predicate: same_seam_extension_non_summing, configs: all}
  count: 71
  exemplars:
    - {config: default, codepoints: "E650:E670:E665", baseline: "qsPea.half.ex-y5.ex-dips|qsIt.en-y5.ex-y0.ex-ext-1|qsMay.en-y0.ex-y5.en-ext-1", new: "...|qsIt...ex-ext-1|qsMay.loop.en-y0 (no en-ext-1)"}
  why: |
    Extensions never sum on one seam (design section 6.2): when the predecessor's exit already carries the seam's extra pixel, the follower's entry extension is suppressed. Today's pipeline applies both on these windows. Prototype divergence 3 / M1-PLAN expected class 4. Round-1 verdict: 28 approvals / 2 rejects / 3 eithers; the 2 rejects (u-0636 "new way has a worse ·May·It join", u-0656 "the old way seems nicer to write out by hand") contradict the 28 same-phenomenon approvals at window grain and honoring them would repeal the non-summing law, so they are presumed noise pending one ruling — re-present them next to u-0637/u-0654/u-0663.
    Round-2 verdict: the two re-presented rejects (u-0417 ·Pea·May·It·May, u-0437 ◊ZWNJ ·May·It·May) were re-confirmed as rejects by the user. The build-tested lever hunt confirms there is no closed-vocabulary record that flips them to old ink without collateral: the only mechanism that drops ·May's en-ext-1 is this same non-summing suppression, which fires solely on the immediate-left predecessor's exit extension, so honoring the rejects would either repeal the 28-window non-summing law or require the same depth-2 left-context predicate the engine does not have. Status stays reviewed-approved (the 28 approvals govern the class); these 2 windows stay documented engine-limited residue. (The sibling halves-entry-extension-restored 27 they were bracketed with are since resolved by removing qsMay's baseline-entry extend record — see may-baseline-entry-extension-dropped — but that lever does not reach these two: they are same-seam windows where the predecessor's own ex-ext-1 drives the suppression, so ·May's baseline entry is beside the point and the depth-2 left-context predicate is still what an engine fix would need.)


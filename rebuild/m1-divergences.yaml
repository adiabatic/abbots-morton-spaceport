- id: kern-channel-out-of-scope
  status: triaged
  match: {predicate: kern_channel_out_of_scope, configs: all}
  count: 0
  exemplars: []
  why: |
    Position-only residue the comparison marks kern-attributable: the oracle gate shapes every seam- and ligation-identical row against the new font and diffs per-slot positions against the baseline with sidecar kerns normalized out (KernEvaluator over glyph_data/senior_quikscript_kerning.yaml; the in-alphabet kerned pairs are ·Oy·Pea at -3 and ·Oy·Oy at -1), so residue can only be a kern the normalization mis-modeled or a ZWNJ-adjacency artifact — the predicate requires the drifted slots to sit on such a pair, and any other position drift matches nothing and fails. Expected zero; kept as the explicit triage channel per M1-PLAN section 6 class 9; retire at review if still zero at cutover.

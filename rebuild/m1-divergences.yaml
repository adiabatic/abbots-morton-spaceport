# The M1 divergence ledger (M1-PLAN section 6): one entry per reviewed divergence class between the settlement function and the section 13.1 baseline oracle over the 8-symbol alphabet.
# Every divergent row must match exactly one entry; `conform.classify_divergence` assigns each row the single highest-precedence class from its phenomenon set (ligation, then seam topology, then cell-grain deltas in the order extension-restored > non-summing > withdrawal > locked > dropped > added), so the predicates partition by construction. Counts are filled from the conformance run and reviewed as a diff; the run never writes this file. Per-row detail lands in rebuild/out/m1/divergence-audit.tsv.

- id: zwnj-word-initial-unification
  status: intended
  match: {predicate: zwnj_word_initial_unification, configs: all}
  ink_identical: true
  count: 1421
  exemplars:
    - {config: default, codepoints: "200C:E670:E670", baseline: "space|qsIt.ex-y5|qsIt", new: "uni200C|qsIt.bar.locked|qsIt.bar"}
  why: |
    Post-ZWNJ is definitionally word-initial in the new model (design section 3.4): the authored .noentry shadow universe is deleted and the chokepoint mints generated locked twins instead, so every post-ZWNJ position diverges at name grain (old `<x>.noentry` or a contextually leaked bare name, new `<cell>.locked`). Seams agree; the locked twin's drawing equals the old shadow glyph's.


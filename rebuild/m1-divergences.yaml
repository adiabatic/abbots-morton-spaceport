- id: halves-entry-extension-restored
  status: reviewed-rejected
  match: {predicate: halves_entry_extension_restored, configs: all}
  count: 160
  exemplars:
    - {config: ss03, codepoints: "E650:E665:E652", baseline: "qsPea|qsMay.en-y0.ex-y5.ex-ext-1|qsTea.half.en-y5.after-xheight-exit", new: "qsPea.full.ex-y0|qsMay.loop.en-y0.ex-y5.en-ext-1.ex-ext-1|qsTea.half.en-y5"}
  why: |
    Round-1 verdict: rejected — the bulk of the class (qsIt's transcribed halves-minus-qsPea x-height entry-extension record, 1,055 of the original 1,218 rows) was reverted by deleting that record; the shipped font never realized it ("this widens the ·Tea·It extension for no reason"). The surviving rows are two documented residues. (1) The exemplar's phenomenon: under ss03, when ·May joins from ·Pea/·Tea at the baseline and also extends its x-height exit toward a following half-·Tea, settlement composes en-ext-1 + ex-ext-1 on one cell where today's cascade drops the entry extension; the verdict signal there is contradictory (10 rejects on ·Pea·May·Tea-shaped words against u-0468's approval and the 40 ss03-chain approvals of the identical cell), no clean revert exists in the closed when: vocabulary (entry-side extend and contract do not net at name grain), and one question is open with the user — keep the composed extension everywhere, or feature-scoped engine work to drop it. (2) Regrouping residuals: in [X]·Oy·It·May shapes the round-1 restored ·It·May baseline join carries ·May's en-ext-1 because "the predecessor's predecessor is entered" is not expressible in the closed when: vocabulary; the residual is the same single-extension connector approved 28 times in same-seam-extension-non-summing.
    Round-2 verdict (POLICY-ROUND-2-REPORT.md): the round-1 open question resolves toward reject. The user re-triaged both residues and rejected them firmly — 15 ·Pea·May·Tea-under-ss03 windows ("pea-may": the composed en-ext-1 + ex-ext-1) and 12 [X]·Oy·It·May windows ("it-may": the restored ·It·May baseline join's en-ext-1) — 27 reject units in this class. The round-1 contradiction is now understood, not contradictory: the approved siblings (u-0393 ·Pea·May·Tea·Tea, u-0468) are the cases where ·May pulls back and never composes ex-ext-1, so they carry no summed extension; the user rejects the summing and keeps the single extension. An exhaustive, build-tested lever hunt (25 candidate records across 5 independent lever families — qsMay right/self-scoped suppression, extend-narrowing + non-summing, qsPea/qsTea predecessor-exit, qsIt two-side, ligature/same-seam — each scratch-built against a harness proven byte-identical to the oracle) found zero closed-vocabulary record that reverts any reject to old ink without collateral. The wall is a depth-2 left-context predicate the frozen when: grammar cannot express: for "pea-may", ·May's immediate-left predecessor is byte-identical (qsPea, full, baseline exit, vertical, joined_at baseline) in the bare reject and the APPROVED ·Pea·Pea·May·Tea, differing only in the predecessor's own entry (none vs y6); for "it-may" it is the predecessor's predecessor (·Oy), and the reject ·Oy·It·May is ink-identical to the approved ·Oy·It·May·Tea but for the 4th glyph. The token grammar compounds it: an extend always emits en-ext-1 (a competing more-specific extend re-emits it — build-confirmed 0 collateral but 0 revert), a contract coexists without netting (round-1's result, reproduced as 51 unmatched), and a refuse collapses the whole ·Pea→·May / ·It→·May cell rather than dropping the token. Disposition: no records authored; the class stays reviewed-rejected with these 27 windows as the documented engine-limited residue. Honoring the verdicts is one coherent feature-scoped engine task — extend same-seam non-summing to also fire on the follower's own summed exit (the ss03 "pea-may" case) plus a depth-2 left-context predicate (the "it-may" case) — surfaced for a future milestone.

- id: same-seam-extension-non-summing
  status: reviewed-approved
  match: {predicate: same_seam_extension_non_summing, configs: all}
  count: 225
  exemplars:
    - {config: default, codepoints: "E650:E670:E665", baseline: "qsPea.half.ex-y5.ex-dips|qsIt.en-y5.ex-y0.ex-ext-1|qsMay.en-y0.ex-y5.en-ext-1", new: "...|qsIt...ex-ext-1|qsMay.loop.en-y0 (no en-ext-1)"}
  why: |
    Extensions never sum on one seam (design section 6.2): when the predecessor's exit already carries the seam's extra pixel, the follower's entry extension is suppressed. Today's pipeline applies both on these windows. Prototype divergence 3 / M1-PLAN expected class 4. Round-1 verdict: 28 approvals / 2 rejects / 3 eithers; the 2 rejects (u-0636 "new way has a worse ·May·It join", u-0656 "the old way seems nicer to write out by hand") contradict the 28 same-phenomenon approvals at window grain and honoring them would repeal the non-summing law, so they are presumed noise pending one ruling — re-present them next to u-0637/u-0654/u-0663.
    Round-2 verdict (POLICY-ROUND-2-REPORT.md): the two re-presented rejects (u-0417 ·Pea·May·It·May, u-0437 ◊ZWNJ ·May·It·May) were re-confirmed as rejects by the user. The build-tested lever hunt confirms there is no closed-vocabulary record that flips them to old ink without collateral: the only mechanism that drops ·May's en-ext-1 is this same non-summing suppression, which fires solely on the immediate-left predecessor's exit extension, so honoring the rejects would either repeal the 28-window non-summing law or require the same depth-2 left-context predicate the engine does not have. Status stays reviewed-approved (the 28 approvals govern the class); these 2 windows are documented engine-limited residue alongside the halves-entry-extension-restored 27, to be addressed by the same feature-scoped extension-suppression milestone.


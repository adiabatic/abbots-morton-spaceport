# The M1 divergence ledger (M1-PLAN section 6): one entry per reviewed divergence class between the settlement function and the section 13.1 baseline oracle over the 8-symbol alphabet.
# Every divergent row must match exactly one entry; `conform.classify_divergence` assigns each row the single highest-precedence class from its phenomenon set (the boundary-echo blanket first — any non-position row whose window contains a run-splitting boundary, space or ZWNJ — then ligation, then seam topology, then cell-grain deltas in the order extension-restored > non-summing > extension-dropped > withdrawal > locked > dropped > added), so the predicates partition by construction. Counts are filled from the conformance run and reviewed as a diff; the run never writes this file. Per-row detail lands in rebuild/out/m1/divergence-audit.tsv.
# Status vocabulary: intended (designed behavior, no review needed) | drift-accepted (observed drift accepted pending human review) | triaged (explicit triage channel) | reviewed-approved (the class behavior was triaged by the user in the round-1 verdict pass and approved; the divergence is user-ratified, not merely drift-accepted) | reviewed-rejected (the class behavior was rejected in the round-1 verdict pass and that round's policy records restore the old behavior; the surviving rows are the documented residue).
# An entry may additionally carry `no_verdict: true`: a ratified rule adjudicates the class wholesale, so no unit in it ever needs an individual verdict. The review build gives such units no batch and the surface disables their verdict controls; verdicts recorded against them in old exports are inert history.

- id: boundary-echo
  status: intended
  no_verdict: true
  match: {predicate: boundary_echo, configs: all}
  count: 33508
  exemplars:
    - {config: default, codepoints: "200C:E67A:E665", baseline: "space|qsUtter.noentry|qsMay.en-y5 (y5 join on the shadow)", new: "uni200C|qsUtter.alternate.locked|qsMay.loop.en-y0 (y0 join, word-initial)"}
    - {config: default, codepoints: "0020:E650:E650", baseline: "space|qsPea.half.en-y6.ex-y6|qsPea.en-y6", new: "space|qsPea.half.ex-y6|qsPea.full.en-y6 (the bare E650:E650 row's name-grain echo across a space)"}
  why: |
    The ratified boundary-equals-word-boundary rule (ZWNJ 2026-07-03, extended to space the same day, generalizing design section 3.4): a window containing a run-splitting boundary — space or ZWNJ — never needs its own verdict. Post-boundary is definitionally word-initial and pre-boundary definitionally word-final, so the new font renders every segment of a boundary window identically to that segment standing alone — a guarantee that lives in the font's vetting code, not in this transitional ledger: run_boundary_equivalence enforces it per build over the exhaustive enumeration for every splits_runs token (with the namer-dot carve-out removed — the dot no longer lowers through a ZWNJ, the last cross-boundary behavior), and the rune schema admits neither `is: zwnj` nor `is: space`, so no record can ever distinguish a run-splitting boundary from a text edge. A boundary row can therefore only diverge from the baseline in two ways, neither adjudicable here: a segment-internal divergence, which resurfaces on the segment's own enumerated row (every segment of a length-≤5 window is itself a length-≤5 window), or the old font's boundary-context-only inconsistency (the post-ZWNJ shadow universe — post-space ·Utter·May joins at y0 while post-ZWNJ joined at y5 — and its space-side counterpart), which is exactly what the rule retires — unrecoverable by design, since honoring it would resurrect a boundary-conditioned form. ZWNJ evidence: subsumes the ZWNJ share of the former zwnj-word-initial-unification (round-1: 1,421 ink-identical rows), zwnj-follower-exit-restored (reviewed-approved), and zwnj-word-initial-seam-moved classes, and the round-2 re-adjudication of the same-question-twice pairs (u-15220 approve vs u-15230 reject on identical new ink) that motivated the rule. Space evidence: of the 744 space units verdicted on the pre-blanket surface (679 approve / 32 reject / 31 neither / 2 either), only 2 rejects were not mirrored by a boundary-sibling reject — u-15228 ·No·It·Day ␣ and u-15241 ·No·It·Utter ␣ (deferred-ss04) — and both contradict their approved bare siblings u-15220/u-15221, the same double-ask pathology as the ZWNJ pair; no space reject was about the space context itself, and the rule retires those two rejects. Position-only rows are exempt and still route through kern attribution (the old font kerns across spaces and straight through ZWNJ).


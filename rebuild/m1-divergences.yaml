    Post-ZWNJ is definitionally word-initial in the new model (design section 3.4): the authored .noentry shadow universe is deleted and the chokepoint mints generated locked twins instead, so every post-ZWNJ position diverges at name grain (old `<x>.noentry` or a contextually leaked bare name, new `<cell>.locked`). Seams agree; the locked twin's drawing equals the old shadow glyph's. Since the boundary-echo blanket (above) now takes every ZWNJ row first, this entry keeps only the namer-dot remainder of the shadow-universe deletion — the old pipeline minted the same `.noentry` shadows after the namer dot (id kept for the documentation trail).

